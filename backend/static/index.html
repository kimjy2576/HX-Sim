<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❄️ HX Simulator v7.9-L2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;color:#e2e8f0;font-family:'JetBrains Mono','SF Mono','Fira Code','Courier New',monospace}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#111827}
::-webkit-scrollbar-thumb{background:#2a3a52;border-radius:3px}
input,select{font-family:inherit}
input:focus,select:focus{border-color:#38bdf8!important;outline:none}
button:hover{opacity:0.9}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useCallback, useEffect} = React;

const API_URL = window.location.origin;

const DEFAULT_FT = {
  W:0.241,H:0.566,D:0.06,Do:0.005,Di:0.00442,Pt:0.0141,Pl:0.010,
  Nr:6,Nt:4,layout:"staggered",FPI:22,fin_thickness:0.00012,
  fin_type:"slit",k_fin:200,
  wavy_amplitude:0.001,wavy_wavelength:0.01,
  louver_pitch:0.0017,louver_angle:27,
  slit_height:0.001,slit_width:0.007,n_slits:4,
  N_seg:10,circuit_mode:"custom"
};
const DEFAULT_MCHX = {
  W:0.6,H:0.4,D:0.02,n_slabs:1,ch_width:0.001,ch_height:0.0015,
  ch_wall:0.0003,n_ports:12,tube_height:0.002,tube_pitch:0.01,
  louver_pitch:0.0013,louver_angle:27,fin_pitch:0.0014,fin_thickness:0.0001,
  fin_height:0.008,k_fin:200,N_seg:5,N_tubes:40
};
const REFRIGERANTS = ["R410A","R134a","R32","R290","R1234yf","R22","R407C","R404A","R513A","R454C"];

const C = {
  bg:"#0a0e17",surface:"#111827",card:"#1a2233",border:"#2a3a52",
  accent:"#38bdf8",accent2:"#818cf8",accent3:"#f472b6",
  warn:"#fbbf24",success:"#34d399",err:"#ef4444",
  text:"#e2e8f0",dim:"#94a3b8"
};

/* ===== Pure CSS Bar Chart ===== */
function BarChart({data, dataKey, nameKey, color, height=180}) {
  if (!data||data.length===0) return null;
  const maxVal = Math.max(...data.map(d=>Math.abs(d[dataKey])||0), 1);
  return (
    <div style={{height,display:"flex",alignItems:"flex-end",gap:4,padding:"10px 0"}}>
      {data.map((d,i)=>{
        const val = d[dataKey]||0;
        const h = Math.max((Math.abs(val)/maxVal)*(height-40),2);
        return (
          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <span style={{fontSize:9,color:C.dim}}>{Math.round(val)}</span>
            <div style={{width:"100%",maxWidth:60,height:h,background:color||C.accent,
              borderRadius:"4px 4px 0 0",opacity:0.7+0.3*(1-i/data.length),
              transition:"height 0.3s"}}/>
            <span style={{fontSize:9,color:C.dim}}>{d[nameKey]}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ===== Pure SVG Line Chart ===== */
function LineChartSVG({data, lines, height=200}) {
  if (!data||data.length<2) return null;
  const W=600,H=height-40,pad=40;
  const pw=(W-2*pad)/(data.length-1);
  return (
    <svg viewBox={`0 0 ${W} ${height}`} style={{width:"100%",height}}>
      {[0,0.25,0.5,0.75,1].map(f=>(
        <line key={f} x1={pad} x2={W-pad} y1={pad+H*(1-f)} y2={pad+H*(1-f)}
          stroke={C.border} strokeWidth={0.5} strokeDasharray="4 4"/>
      ))}
      {lines.map(({key,color,label,min,max})=>{
        const vals=data.map(d=>d[key]||0);
        const lo=min!==undefined?min:Math.min(...vals);
        const hi=max!==undefined?max:Math.max(...vals);
        const range=hi-lo||1;
        const pts=data.map((d,i)=>`${pad+i*pw},${pad+H*(1-(((d[key]||0)-lo)/range))}`).join(" ");
        return (
          <g key={key}>
            <polyline points={pts} fill="none" stroke={color} strokeWidth={2}/>
            {data.map((d,i)=>{
              const x=pad+i*pw,y=pad+H*(1-(((d[key]||0)-lo)/range));
              return <circle key={i} cx={x} cy={y} r={3} fill={color}/>;
            })}
            <text x={W-pad+5} y={pad+H*(1-((vals[vals.length-1]-lo)/range))}
              fill={color} fontSize={10} dominantBaseline="middle">{label}</text>
          </g>
        );
      })}
      {data.map((d,i)=>(
        <text key={i} x={pad+i*pw} y={height-5} fill={C.dim} fontSize={8}
          textAnchor="middle">{d.name}</text>
      ))}
    </svg>
  );
}

/* ===== UI Components ===== */
function InputGroup({label,children}) {
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:C.accent,marginBottom:10}}>{label}</div>
      {children}
    </div>
  );
}
function Field({label,unit,value,onChange,type="number",options,step,min,max}) {
  const row={display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,gap:8};
  const inp={background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 8px",fontSize:13,width:100,textAlign:"right"};
  if(options) return (
    <div style={row}><span style={{fontSize:12,color:C.dim}}>{label}</span>
    <select value={value} onChange={e=>onChange(e.target.value)} style={{...inp,width:120,textAlign:"left",cursor:"pointer"}}>
      {options.map(o=><option key={o} value={o}>{o}</option>)}</select></div>);
  return (
    <div style={row}>
      <span style={{fontSize:12,color:C.dim}}>{label} {unit&&<span style={{color:C.accent,fontSize:10}}>[{unit}]</span>}</span>
      <input type={type} value={value} step={step||"any"} min={min} max={max}
        onChange={e=>onChange(type==="number"?parseFloat(e.target.value)||0:e.target.value)} style={inp}/>
    </div>);
}
function Metric({label,value,unit,color=C.accent}) {
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 16px",
      flex:"1 1 140px",minWidth:140,borderTop:`3px solid ${color}`}}>
      <div style={{fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:1}}>{label}</div>
      <div style={{fontSize:22,fontWeight:700,color,marginTop:4}}>
        {value} <span style={{fontSize:11,color:C.dim}}>{unit}</span>
      </div>
    </div>);
}

/* ===== Main App ===== */
function App() {
  const [hxType,setHxType]=useState("FT");
  const [mode,setMode]=useState("cond");
  const [airIn,setAirIn]=useState({T:35,RH:0.98,flowMode:"CMM",V:2.0,CMM:2.6});
  const [refIn,setRefIn]=useState({fluid:"R290",stateMode:"P",T_sat:null,P_sat:2811,m_ref:16.5,massUnit:"kg/hr",twoPhase:false,x_in:0.2,T_ref_in:92.6});
  const [flow,setFlow]=useState("counter");
  const [solverCfg,setSolverCfg]=useState({max_outer:30,tol_pct:0.1});
  const [corrFact,setCorrFact]=useState({cf_j:1.0,cf_f:1.0,cf_hi:1.0,cf_dp_ref:1.0});
  const [ftSpec,setFtSpec]=useState({...DEFAULT_FT});
  const [mchxSpec,setMchxSpec]=useState({...DEFAULT_MCHX});
  const [airCorr,setAirCorr]=useState({mode:"auto",selected:null});
  const [fCorr,setFCorr]=useState({mode:"auto",selected:null});
  const [refCorr,setRefCorr]=useState({evap:{mode:"auto",selected:null},cond:{mode:"auto",selected:null}});
  const [dpRefCorr,setDpRefCorr]=useState({mode:"auto",selected:null});
  const [bendFace,setBendFace]=useState("front");
  const [bendFirst,setBendFirst]=useState(null);
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [tab,setTab]=useState("overview");
  const [contourVar,setContourVar]=useState("T_wall");
  const [contourView,setContourView]=useState("full"); // full | byRow | byCol
  const [contourIdx,setContourIdx]=useState(0); // selected row or tube index
  const [serverOk,setServerOk]=useState(null);

  useEffect(()=>{
    fetch(API_URL+"/api").then(r=>r.json()).then(()=>setServerOk(true)).catch(()=>setServerOk(false));
  },[]);

  // ── Save / Load defaults via localStorage ──
  const STORAGE_KEY = "hxsim_defaults";
  const STORAGE_VER = 2; // increment to invalidate old saves
  const [saveFlash,setSaveFlash]=useState(false);
  const collectState = ()=>({_ver:STORAGE_VER,hxType,mode,airIn,refIn,flow,solverCfg,corrFact,ftSpec,mchxSpec,airCorr,fCorr,refCorr,dpRefCorr});
  const saveDefaults = ()=>{
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(collectState())); }catch(e){}
    setSaveFlash(true); setTimeout(()=>setSaveFlash(false),1500);
  };
  const resetDefaults = ()=>{
    try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
    setHxType("FT"); setMode("cond");
    setAirIn({T:35,RH:0.98,flowMode:"CMM",V:2.0,CMM:2.6});
    setRefIn({fluid:"R290",stateMode:"P",T_sat:null,P_sat:2811,m_ref:16.5,massUnit:"kg/hr",twoPhase:false,x_in:0.2,T_ref_in:92.6});
    setFlow("counter"); setSolverCfg({max_outer:30,tol_pct:0.1});
    setCorrFact({cf_j:1.0,cf_f:1.0,cf_hi:1.0,cf_dp_ref:1.0});
    setFtSpec({...DEFAULT_FT}); setMchxSpec({...DEFAULT_MCHX});
    setAirCorr({mode:"auto",selected:null}); setFCorr({mode:"auto",selected:null});
    setRefCorr({evap:{mode:"auto",selected:null},cond:{mode:"auto",selected:null}});
    setDpRefCorr({mode:"auto",selected:null});
  };
  useEffect(()=>{
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      const d = JSON.parse(raw);
      if(d._ver !== STORAGE_VER) { localStorage.removeItem(STORAGE_KEY); return; }
      if(d.hxType) setHxType(d.hxType);
      if(d.mode) setMode(d.mode);
      if(d.airIn) setAirIn(p=>({...p,...d.airIn}));
      if(d.refIn) setRefIn(p=>({...p,...d.refIn}));
      if(d.flow) setFlow(d.flow);
      if(d.solverCfg) setSolverCfg(p=>({...p,...d.solverCfg}));
      if(d.corrFact) setCorrFact(p=>({...p,...d.corrFact}));
      if(d.ftSpec) setFtSpec(p=>({...p,...d.ftSpec}));
      if(d.mchxSpec) setMchxSpec(p=>({...p,...d.mchxSpec}));
      if(d.airCorr) setAirCorr(p=>({...p,...d.airCorr}));
      if(d.fCorr) setFCorr(p=>({...p,...d.fCorr}));
      if(d.refCorr) setRefCorr(p=>({...p,...d.refCorr}));
      if(d.dpRefCorr) setDpRefCorr(p=>({...p,...d.dpRefCorr}));
    }catch(e){}
  },[]);

  const uA=(k,v)=>setAirIn(p=>({...p,[k]:v}));
  const uR=(k,v)=>setRefIn(p=>({...p,[k]:v}));
  const uF=(k,v)=>setFtSpec(p=>({...p,[k]:v}));
  const uM=(k,v)=>setMchxSpec(p=>({...p,[k]:v}));

  const run=useCallback(async()=>{
    setLoading(true);setError("");
    try {
      const body={hx_type:hxType,mode,T_air_in_C:airIn.T,RH_in:airIn.RH,
        air_flow_mode:airIn.flowMode,
        fluid:refIn.fluid,m_ref:refIn.massUnit==="kg/hr"?refIn.m_ref/3600:refIn.m_ref,flow_arrangement:flow,
        two_phase_inlet:refIn.twoPhase,x_in:refIn.x_in};
      if(airIn.flowMode==="velocity") body.V_air=airIn.V; else body.CMM=airIn.CMM||18;
      if(airCorr.mode==="manual"&&airCorr.selected) body.air_j_corr=airCorr.selected;
      if(fCorr.mode==="manual"&&fCorr.selected) body.air_f_corr=fCorr.selected;
      if(refCorr.evap.mode==="manual"&&refCorr.evap.selected) body.evap_corr=refCorr.evap.selected;
      if(refCorr.cond.mode==="manual"&&refCorr.cond.selected) body.cond_corr=refCorr.cond.selected;
      if(dpRefCorr.mode==="manual"&&dpRefCorr.selected) body.dp_ref_corr=dpRefCorr.selected;
      if(refIn.stateMode==="T") body.T_sat_C=refIn.T_sat; else body.P_sat_kPa=refIn.P_sat;
      if(!refIn.twoPhase&&refIn.T_ref_in!==null) body.T_ref_in_C=refIn.T_ref_in;
      if(hxType==="FT"){
        const spec={...ftSpec};
        // Generate default row-by-row serpentine bends if none set
        const cnt=flow==="counter";
        if(!spec.bends||(!(spec.bends.front||[]).length&&!(spec.bends.back||[]).length)){
          const front=[],back=[];
          let atF2=true;
          const sRow=cnt?spec.Nr-1:0, rStep=cnt?-1:1;
          for(let ri=0;ri<spec.Nr;ri++){
            const row=sRow+ri*rStep;
            const goR=(ri%2===0);
            if(goR){for(let c=0;c<spec.Nt-1;c++){if(atF2)front.push([row,c,row,c+1]);else back.push([row,c,row,c+1]);atF2=!atF2;}}
            else{for(let c=spec.Nt-1;c>0;c--){if(atF2)front.push([row,c,row,c-1]);else back.push([row,c,row,c-1]);atF2=!atF2;}}
            if(ri<spec.Nr-1){const nRow=sRow+(ri+1)*rStep;const ec=goR?spec.Nt-1:0;
              if(atF2)front.push([row,ec,nRow,ec]);else back.push([row,ec,nRow,ec]);atF2=!atF2;}
          }
          spec.bends={front,back};
        }
        // Convert bends → circuits
        spec.circuit_mode="custom";
        const fm2={},bm2={};
        (spec.bends.front||[]).forEach(([r1,c1,r2,c2])=>{fm2[`${r1},${c1}`]=[r2,c2];fm2[`${r2},${c2}`]=[r1,c1];});
        (spec.bends.back||[]).forEach(([r1,c1,r2,c2])=>{bm2[`${r1},${c1}`]=[r2,c2];bm2[`${r2},${c2}`]=[r1,c1];});
        const visited=new Set(),circs=[];
        for(let c2=0;c2<spec.Nt;c2++) for(let r=0;r<spec.Nr;r++){
          const k=`${r},${c2}`;
          if(visited.has(k)) continue;
          const hasF=fm2.hasOwnProperty(k),hasB=bm2.hasOwnProperty(k);
          if(hasF&&hasB) continue;
          if(!hasF&&!hasB){circs.push([[r,c2]]);visited.add(k);continue;}
          const path=[]; let cur=[r,c2]; let lk=hasB?"back":"front";
          path.push([...cur]);visited.add(`${cur[0]},${cur[1]}`);
          while(true){const map=lk==="front"?fm2:bm2;const ck=`${cur[0]},${cur[1]}`;
            if(!map.hasOwnProperty(ck))break;const nx=map[ck];const nk=`${nx[0]},${nx[1]}`;
            if(visited.has(nk))break;
            path.push([...nx]);visited.add(nk);cur=nx;lk=lk==="front"?"back":"front";}
          circs.push(path);
        }
        // Correct path direction: counter→inlet at high row, parallel→inlet at low row
        circs.forEach(ci=>{if(ci.length<2)return;
          if(cnt&&ci[0][0]<ci[ci.length-1][0])ci.reverse();
          if(!cnt&&ci[0][0]>ci[ci.length-1][0])ci.reverse();});
        spec.circuits=circs;
        delete spec.bends;
        body.ft_spec=spec;
      } else {
        const ms={...mchxSpec};
        // Convert baffles → passes
        const baf=ms.baffles||{front:[],back:[]};
        const allB=[...(baf.front||[]),...(baf.back||[])].sort((a,b)=>a-b);
        const uniq=[...new Set(allB)];
        if(uniq.length>0){
          const passes=[];let st=0;
          for(const b of uniq){if(b>=st&&b<ms.N_tubes-1){passes.push(Array.from({length:b+1-st},(_,i)=>st+i));st=b+1;}}
          passes.push(Array.from({length:ms.N_tubes-st},(_,i)=>st+i));
          ms.passes=passes;
        }
        delete ms.baffles;
        body.mchx_spec=ms;
      }
      body.max_outer=solverCfg.max_outer;
      body.outer_tol_pct=solverCfg.tol_pct;
      body.cf_j=corrFact.cf_j; body.cf_f=corrFact.cf_f;
      body.cf_hi=corrFact.cf_hi; body.cf_dp_ref=corrFact.cf_dp_ref;
      const res=await fetch(`${API_URL}/simulate`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(!res.ok){const e=await res.json();throw new Error(e.detail||"Failed");}
      setResult(await res.json());setTab("overview");
    }catch(e){setError(e.message);}finally{setLoading(false);}
  },[hxType,mode,airIn,refIn,flow,ftSpec,mchxSpec,airCorr,fCorr,refCorr,solverCfg,dpRefCorr,corrFact]);

  const segData=(result&&result.segments||[]).filter(s=>s.tube===0).map(s=>({
    name:`R${s.row}S${s.seg}`,Q:s.Q,T_wall:s.T_wall,h_i:s.h_i,x:s.x_ref,eta_o:s.eta_o,dp_ref:s.dp_ref
  }))||[];
  const rowData=(result&&result.row_Q||[]).map((q,i)=>({name:`R${i}`,Q:q}))||[];
  const mc=mode==="evap"?C.accent:C.accent3;

  return (
    <div style={{minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${C.surface},${C.card})`,
        borderBottom:`1px solid ${C.border}`,padding:"16px 24px",display:"flex",alignItems:"center",gap:16}}>
        <div style={{fontSize:20,fontWeight:800}}>
          <span style={{color:C.accent}}>❄️</span> HX Simulator
          <span style={{color:C.dim,fontSize:11,marginLeft:8}}>v7.9-L2</span>
        </div>
        <div style={{flex:1}}/>
        {serverOk!==null&&(
          <div style={{fontSize:11,color:serverOk?C.success:C.err,display:"flex",alignItems:"center",gap:6}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:serverOk?C.success:C.err,display:"inline-block"}}/>
            {serverOk?"Backend Connected":"Backend Offline"}
          </div>
        )}
        <div style={{fontSize:10,color:C.dim,textAlign:"right",lineHeight:1.4}}>
          Chen · Kim&Mudawar · Shah<br/>Gnielinski · Wang · Chang&Wang
        </div>
      </div>

      <div style={{display:"flex",minHeight:"calc(100vh - 60px)"}}>
        {/* LEFT PANEL */}
        <div style={{width:320,flexShrink:0,padding:16,borderRight:`1px solid ${C.border}`,
          overflowY:"auto",maxHeight:"calc(100vh - 60px)"}}>

          <InputGroup label="Configuration">
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              {["FT","MCHX"].map(t=>(
                <button key={t} onClick={()=>setHxType(t)} style={{flex:1,padding:"8px 0",borderRadius:8,
                  border:"none",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit",
                  background:hxType===t?C.accent:C.bg,color:hxType===t?C.bg:C.dim}}>
                  {t==="FT"?"🔧 Fin-Tube":"⚡ MCHX"}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:6}}>
              {["evap","cond"].map(m=>(
                <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"8px 0",borderRadius:8,
                  border:"none",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit",
                  background:mode===m?mc:C.bg,color:mode===m?C.bg:C.dim}}>
                  {m==="evap"?"❄️ Evaporator":"🔥 Condenser"}</button>
              ))}
            </div>
            <div style={{marginTop:8}}>
              <Field label="Flow" options={["counter","parallel"]} value={flow} onChange={setFlow}/>
            </div>
            <div style={{display:"flex",gap:6,marginTop:6,alignItems:"center"}}>
              <span style={{fontSize:11,color:C.dim,whiteSpace:"nowrap"}}>Max Iter</span>
              <input type="number" value={solverCfg.max_outer} step={5} min={5} max={100}
                onChange={e=>setSolverCfg(p=>({...p,max_outer:parseInt(e.target.value)||10}))}
                style={{background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 6px",fontSize:13,width:50,textAlign:"right"}}/>
              <span style={{fontSize:11,color:C.dim,whiteSpace:"nowrap"}}>Tol<span style={{color:C.accent,fontSize:9}}> [%]</span></span>
              <input type="number" value={solverCfg.tol_pct} step={0.05} min={0.01} max={5}
                onChange={e=>setSolverCfg(p=>({...p,tol_pct:parseFloat(e.target.value)||0.1}))}
                style={{background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 6px",fontSize:13,width:50,textAlign:"right"}}/>
            </div>
            {/* Correction Factors */}
            <div style={{marginTop:8,borderTop:`1px solid ${C.border}`,paddingTop:8}}>
              <div style={{fontSize:9,color:C.warn,fontWeight:700,marginBottom:6,letterSpacing:0.5}}>CORRECTION FACTORS</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 10px"}}>
                {[
                  {k:"cf_j",  l:"Air j",   tip:"공기측 h_o"},
                  {k:"cf_f",  l:"Air f",   tip:"공기측 ΔP"},
                  {k:"cf_hi", l:"Ref h_i",  tip:"냉매측 h_i"},
                  {k:"cf_dp_ref",l:"Ref ΔP",tip:"냉매측 ΔP"},
                ].map(({k,l,tip})=>(

              {ftSpec.fin_type==="wavy"&&(<>
                <div style={{borderLeft:`2px solid ${C.warn}`,paddingLeft:10,marginBottom:6}}>
                  <div style={{fontSize:9,color:C.warn,fontWeight:700,marginBottom:4}}>WAVY FIN</div>
                  <Field label="Xa" unit="mm" value={ftSpec.wavy_amplitude*1000} onChange={v=>uF("wavy_amplitude",v/1000)}/>
                  <Field label="λ" unit="mm" value={ftSpec.wavy_wavelength*1000} onChange={v=>uF("wavy_wavelength",v/1000)}/>
                </div>
              </>)}
              {ftSpec.fin_type==="louver"&&(<>
                <div style={{borderLeft:`2px solid ${C.accent3}`,paddingLeft:10,marginBottom:6}}>
                  <div style={{fontSize:9,color:C.accent3,fontWeight:700,marginBottom:4}}>LOUVER FIN</div>
                  <Field label="Lp" unit="mm" value={ftSpec.louver_pitch*1000} onChange={v=>uF("louver_pitch",v/1000)}/>
                  <Field label="θ" unit="°" value={ftSpec.louver_angle} onChange={v=>uF("louver_angle",v)}/>
                </div>
              </>)}
              {ftSpec.fin_type==="slit"&&(<>
                <div style={{borderLeft:`2px solid ${C.accent2}`,paddingLeft:10,marginBottom:6}}>
                  <div style={{fontSize:9,color:C.accent2,fontWeight:700,marginBottom:4}}>SLIT FIN</div>
                  <Field label="Ss" unit="mm" value={ftSpec.slit_height*1000} onChange={v=>uF("slit_height",v/1000)}/>
                  <Field label="Sh" unit="mm" value={ftSpec.slit_width*1000} onChange={v=>uF("slit_width",v/1000)}/>
                  <Field label="n_slits" value={ftSpec.n_slits} onChange={v=>uF("n_slits",parseInt(v)||1)}/>
                </div>
              </>)}
              <Field label="N_seg" unit="/tube" value={ftSpec.N_seg} onChange={v=>uF("N_seg",parseInt(v)||1)}/>

              {/* ── Circuit Design ── */}
              {(()=>{ try {
                const Nr=ftSpec.Nr, Nt=ftSpec.Nt;
                const circColors = ["#4ecdc4","#ff6b6b","#45b7d1","#96ceb4","#feca57","#ff9ff3","#54a0ff","#5f27cd"];
                const isStag = ftSpec.layout==="staggered";
                const counter = flow==="counter";

                // ── Generate default single-serpentine bends (row-by-row) ──
                // Counter: inlet at R_last(air outlet), outlet at R0(air inlet)
                // Parallel: inlet at R0(air inlet), outlet at R_last(air outlet)
                const genDefaultBends=(nr,nt,cnt)=>{
                  const front=[],back=[];
                  let atFront=true; // first bend always Front
                  const startRow=cnt?nr-1:0;
                  const rowStep=cnt?-1:1;
                  for(let ri=0;ri<nr;ri++){
                    const row=startRow+ri*rowStep;
                    const goRight=(ri%2===0); // even steps: C0→C_last, odd: C_last→C0
                    // Between-column bends within this row
                    if(goRight){
                      for(let c=0;c<nt-1;c++){
                        if(atFront) front.push([row,c,row,c+1]);
                        else back.push([row,c,row,c+1]);
                        atFront=!atFront;
                      }
                    } else {
                      for(let c=nt-1;c>0;c--){
                        if(atFront) front.push([row,c,row,c-1]);
                        else back.push([row,c,row,c-1]);
                        atFront=!atFront;
                      }
                    }
                    // Row shift bend to next row
                    if(ri<nr-1){
                      const nextRow=startRow+(ri+1)*rowStep;
                      const edgeCol=goRight?nt-1:0;
                      if(atFront) front.push([row,edgeCol,nextRow,edgeCol]);
                      else back.push([row,edgeCol,nextRow,edgeCol]);
                      atFront=!atFront;
                    }
                  }
                  return {front,back};
                };

                // Initialize bends if empty
                // Initialize bends: undefined → generate default, explicit empty → keep empty
                const bends = ftSpec.bends !== undefined && ftSpec.bends !== null
                  ? ftSpec.bends : genDefaultBends(Nr,Nt,counter);

                // ── Trace circuits from front/back bends ──
                const traceBends=(bnds)=>{
                  const fm={}, bm={};
                  (bnds.front||[]).forEach(([r1,c1,r2,c2])=>{
                    fm[`${r1},${c1}`]=[r2,c2]; fm[`${r2},${c2}`]=[r1,c1];
                  });
                  (bnds.back||[]).forEach(([r1,c1,r2,c2])=>{
                    bm[`${r1},${c1}`]=[r2,c2]; bm[`${r2},${c2}`]=[r1,c1];
                  });
                  const visited=new Set(), circuits=[];
                  for(let c=0;c<Nt;c++) for(let r=0;r<Nr;r++){
                    const k=`${r},${c}`;
                    if(visited.has(k)) continue;
                    const hasF=fm.hasOwnProperty(k), hasB=bm.hasOwnProperty(k);
                    if(hasF&&hasB) continue;
                    if(!hasF&&!hasB){
                      // Isolated tube = its own single-tube circuit
                      circuits.push([[r,c]]); visited.add(k); continue;
                    }
                    const path=[]; let cur=[r,c];
                    let lookFace=hasB?"back":"front";
                    path.push([...cur]); visited.add(`${cur[0]},${cur[1]}`);
                    while(true){
                      const map=lookFace==="front"?fm:bm;
                      const ck=`${cur[0]},${cur[1]}`;
                      if(!map.hasOwnProperty(ck)) break;
                      const next=map[ck];
                      const nk=`${next[0]},${next[1]}`;
                      if(visited.has(nk)) break;
                      path.push([...next]); visited.add(nk);
                      cur=next; lookFace=lookFace==="front"?"back":"front";
                    }
                    circuits.push(path);
                  }
                  return circuits;
                };

                const circuits = traceBends(bends);
                // Correct path direction: counter→inlet at high row, parallel→inlet at low row
                circuits.forEach(circ=>{
                  if(circ.length<2) return;
                  const firstR=circ[0][0], lastR=circ[circ.length-1][0];
                  if(counter && firstR<lastR) circ.reverse();
                  if(!counter && firstR>lastR) circ.reverse();
                });
                const nc = circuits.length;

                // Cell map
                const cellMap=Array.from({length:Nr},()=>Array.from({length:Nt},()=>null));
                circuits.forEach((circ,ci)=>{
                  circ.forEach(([r,c],idx)=>{
                    if(r>=0&&r<Nr&&c>=0&&c<Nt) cellMap[r][c]={circ:ci,order:idx};
                  });
                });
                let unassigned=0;
                for(let r=0;r<Nr;r++) for(let c=0;c<Nt;c++) if(!cellMap[r][c]) unassigned++;

                // ── Bend click handler ──
                const onFaceTubeClick=(r,c)=>{
                  if(!bendFirst){setBendFirst({r,c});return;}
                  const dr=Math.abs(r-bendFirst.r), dc=Math.abs(c-bendFirst.c);
                  if(dr+dc===0){setBendFirst(null);return;}
                  if(dr>1||dc>1){setBendFirst(null);return;}
                  const face=bendFace;
                  const arr=[...(bends[face]||[])];
                  const dup=arr.findIndex(([a,b,e,f])=>
                    (a===bendFirst.r&&b===bendFirst.c&&e===r&&f===c)||
                    (a===r&&b===c&&e===bendFirst.r&&f===bendFirst.c));
                  if(dup>=0){ arr.splice(dup,1); }
                  else {
                    const k1=`${bendFirst.r},${bendFirst.c}`, k2=`${r},${c}`;
                    const used1=arr.some(([a,b,e,f])=>`${a},${b}`===k1||`${e},${f}`===k1);
                    const used2=arr.some(([a,b,e,f])=>`${a},${b}`===k2||`${e},${f}`===k2);
                    if(used1||used2){setBendFirst(null);return;}
                    arr.push([bendFirst.r,bendFirst.c,r,c]);
                  }
                  uF("bends",{...bends,[face]:arr});
                  setBendFirst(null);
                };

                const resetToDefault=()=>{
                  uF("bends",genDefaultBends(Nr,Nt,counter));
                  setBendFirst(null);
                };
                const clearBends=()=>{
                  uF("bends",{front:[],back:[]});
                  setBendFirst(null);
                };

                // ── SVG layout ──
                const cW=28,cH=28,oX=22,oY=18;
                const svgW=Nr*cW+oX+10;
                const svgH=Nt*cH+oY+(isStag?cH/2:0)+10;
                const tubeX=(r,c)=>oX+r*cW+cW/2;
                const tubeY=(r,c)=>oY+c*cH+cH/2+(isStag&&r%2===1?cH/2:0);
                const tubeBX=(r,c)=>oX+(Nr-1-r)*cW+cW/2;
                const tubeBY=(r,c)=>oY+c*cH+cH/2+(isStag&&r%2===1?cH/2:0);

                const renderFace=(face)=>{
                  const isFront=face==="front";
                  const tx=isFront?tubeX:tubeBX;
                  const ty=isFront?tubeY:tubeBY;
                  const faceBends=bends[face]||[];

                  return (
                    <svg width={svgW} height={svgH} style={{display:"block",cursor:"crosshair"}}>
                      {/* Air arrow */}
                      <defs><marker id={`arrF${face}`} markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
                        <polygon points="0 0, 5 2, 0 4" fill={C.accent}/></marker></defs>
                      <line x1={oX-2} y1={svgH-4} x2={svgW-10} y2={svgH-4}
                        stroke={C.accent} strokeWidth={1.5} markerEnd={`url(#arrF${face})`}/>
                      <text x={svgW/2} y={svgH+4} textAnchor="middle"
                        style={{fontSize:7,fill:C.accent,fontWeight:700}}>AIR →</text>

                      {/* Row labels (X axis) */}
                      {Array.from({length:Nr},(_,r)=>(
                        <text key={`rl${r}`} x={tx(r,0)} y={oY-4} textAnchor="middle"
                          style={{fontSize:7,fill:C.dim}}>R{r}</text>
                      ))}
                      {/* Col labels (Y axis) */}
                      {Array.from({length:Nt},(_,c)=>(
                        <text key={`cl${c}`} x={4} y={ty(0,c)+3}
                          style={{fontSize:7,fill:C.dim}}>C{c}</text>
                      ))}

                      {/* Bend arcs */}
                      {faceBends.map(([r1,c1,r2,c2],bi)=>{
                        const x1=tx(r1,c1),y1=ty(r1,c1),x2=tx(r2,c2),y2=ty(r2,c2);
                        const info=(cellMap[r1]||[])[c1];
                        const clr=info?circColors[info.circ%circColors.length]:C.accent;
                        const mx=(x1+x2)/2,my=(y1+y2)/2;
                        const dx=x2-x1,dy=y2-y1;
                        const side=isFront?-1:1;
                        const cx2=mx+dy*0.4*side,cy2=my-dx*0.4*side;
                        return <path key={`b${bi}`} d={`M${x1},${y1} Q${cx2},${cy2} ${x2},${y2}`}
                          fill="none" stroke={clr} strokeWidth={2} opacity={0.8}/>;
                      })}

                      {/* Tubes */}
                      {Array.from({length:Nr},(_,r)=>
                        Array.from({length:Nt},(_,c)=>{
                          const x=tx(r,c),y=ty(r,c);
                          const info=cellMap[r][c];
                          const clr=info?circColors[info.circ%circColors.length]:C.surface;
                          const isFirst=bendFirst&&bendFirst.r===r&&bendFirst.c===c;
                          return (
                            <g key={`t${r}-${c}`} onClick={()=>onFaceTubeClick(r,c)}
                              style={{cursor:"pointer"}}>
                              <circle cx={x} cy={y} r={10}
                                fill={isFirst?"#fff":info?clr:C.surface}
                                stroke={isFirst?C.accent:info?clr:C.border}
                                strokeWidth={isFirst?2.5:1} opacity={info?0.9:0.4}/>
                              <text x={x} y={y+3} textAnchor="middle"
                                style={{fontSize:7,fill:isFirst?C.bg:info?"#fff":C.dim,
                                  fontWeight:700,pointerEvents:"none"}}>
                                {info?info.order+1:""}
                              </text>
                            </g>
                          );
                        })
                      )}
                    </svg>
                  );
                };

                return (
                  <div style={{borderLeft:`2px solid ${C.accent}`,paddingLeft:10,marginBottom:6,marginTop:6}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <span style={{fontSize:9,color:C.accent,fontWeight:700}}>REFRIGERANT CIRCUIT</span>
                      <span style={{fontSize:9,color:nc>1?C.warn:C.success,fontWeight:600}}>
                        {nc}회로 {unassigned>0?`· ⚠ 미배정 ${unassigned}`:""}
                      </span>
                    </div>

                    {/* Toolbar */}
                    <div style={{display:"flex",gap:4,marginBottom:6,alignItems:"center",flexWrap:"wrap"}}>
                      <button onClick={resetToDefault} style={{padding:"3px 8px",borderRadius:4,
                        border:`1px solid ${C.accent}`,background:"transparent",color:C.accent,
                        fontSize:9,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>↩ 기본회로</button>
                      <button onClick={clearBends} style={{padding:"3px 8px",borderRadius:4,
                        border:`1px solid ${C.dim}`,background:"transparent",color:C.dim,
                        fontSize:9,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>🗑 전체삭제</button>
                      {bendFirst&&<span style={{fontSize:8,color:C.accent}}>
                        · R{bendFirst.r}C{bendFirst.c} 선택됨</span>}
                    </div>

                    {/* Face tabs */}
                    <div style={{display:"flex",gap:0,marginBottom:4}}>
                      {["front","back"].map(f=>(
                        <button key={f} onClick={()=>{setBendFace(f);setBendFirst(null);}}
                          style={{flex:1,padding:"5px 0",border:"none",cursor:"pointer",
                            fontSize:10,fontWeight:700,fontFamily:"inherit",
                            borderBottom:bendFace===f?`2px solid ${C.accent}`:`1px solid ${C.border}`,
                            background:bendFace===f?`${C.accent}15`:C.bg,
                            color:bendFace===f?C.accent:C.dim,
                            borderRadius:bendFace===f?"6px 6px 0 0":"0"}}>
                          {f==="front"?"▶ FRONT":"◀ BACK"}
                          <span style={{fontSize:8,marginLeft:4,opacity:0.6}}>
                            ({(bends[f]||[]).length}밴드)
                          </span>
                        </button>
                      ))}
                    </div>

                    {/* Active face view */}
                    <div style={{border:`1px solid ${C.accent}33`,borderRadius:"0 0 6px 6px",padding:4,background:`${C.bg}88`}}>
                      {renderFace(bendFace)}
                    </div>

                    <div style={{fontSize:8,color:C.dim,marginTop:3}}>
                      튜브 2개 클릭 = 리턴밴드 추가/제거 · FRONT/BACK 탭으로 면 전환
                    </div>
                  </div>
                );
              } catch(e) { console.error("Circuit editor error:", e); return <div style={{color:"red",fontSize:10,padding:8}}>Circuit error: {String(e.message||e)}</div>; }
              })()} 

            </InputGroup>
          ):(
            <InputGroup label="📐 MCHX Geometry">
              <Field label="W" unit="m" value={mchxSpec.W} onChange={v=>uM("W",v)}/>
              <Field label="H" unit="m" value={mchxSpec.H} onChange={v=>uM("H",v)}/>
              <Field label="ch_w" unit="mm" value={mchxSpec.ch_width*1000} onChange={v=>uM("ch_width",v/1000)}/>
              <Field label="ch_h" unit="mm" value={mchxSpec.ch_height*1000} onChange={v=>uM("ch_height",v/1000)}/>
              <Field label="n_ports" value={mchxSpec.n_ports} onChange={v=>uM("n_ports",parseInt(v)||1)}/>
              <Field label="N_tubes" value={mchxSpec.N_tubes} onChange={v=>uM("N_tubes",parseInt(v)||1)}/>
              <Field label="Lp" unit="mm" value={mchxSpec.louver_pitch*1000} onChange={v=>uM("louver_pitch",v/1000)}/>
              <Field label="θ" unit="°" value={mchxSpec.louver_angle} onChange={v=>uM("louver_angle",v)}/>
              <Field label="Fp" unit="mm" value={mchxSpec.fin_pitch*1000} onChange={v=>uM("fin_pitch",v/1000)}/>
              <Field label="Fl" unit="mm" value={mchxSpec.fin_height*1000} onChange={v=>uM("fin_height",v/1000)}/>
              <Field label="n_slabs" value={mchxSpec.n_slabs} onChange={v=>uM("n_slabs",parseInt(v)||1)}/>
              <Field label="N_seg" unit="/tube" value={mchxSpec.N_seg} onChange={v=>uM("N_seg",parseInt(v)||1)}/>

              {/* ── MCHX Baffle Circuit Design ── */}
              {(()=>{ try {
                const Nt=mchxSpec.N_tubes;
                const baf=mchxSpec.baffles||{front:[],back:[]};
                const circColors=["#4ecdc4","#ff6b6b","#45b7d1","#96ceb4","#feca57","#ff9ff3","#54a0ff","#5f27cd"];

                // Compute passes from baffles
                const allBaf=[...(baf.front||[]),...(baf.back||[])].sort((a,b)=>a-b);
                const unique=[...new Set(allBaf)];
                const passes=[];
                let start=0;
                for(const b of unique){
                  if(b>=start && b<Nt-1){ passes.push(Array.from({length:b+1-start},(_,i)=>start+i)); start=b+1; }
                }
                passes.push(Array.from({length:Nt-start},(_,i)=>start+i));
                const np=passes.length;

                // Tube → pass map
                const tubePass={};
                passes.forEach((p,pi)=>p.forEach(t=>{tubePass[t]=pi;}));

                // Click handler
                const onBafClick=(pos)=>{
                  const face=bendFace;
                  const arr=[...(baf[face]||[])];
                  const idx=arr.indexOf(pos);
                  if(idx>=0) arr.splice(idx,1); else arr.push(pos);
                  arr.sort((a,b)=>a-b);
                  uM("baffles",{...baf,[face]:arr});
                };
                const resetBaffles=()=>uM("baffles",{front:[],back:[]});

                // SVG
                const tH=14, gap=8, oY=20, oX=30;
                const svgW=120, svgH=oY+Nt*tH+(Nt-1)*gap+10;

                const renderManifold=(face)=>{
                  const isFront=face==="front";
                  const isActive=bendFace===face;
                  const faceBaf=baf[face]||[];
                  return (
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:9,fontWeight:700,textAlign:"center",marginBottom:2,
                        color:isActive?C.accent:C.dim,cursor:"pointer",
                        padding:"2px 0",borderRadius:4,background:isActive?C.accent+"15":"transparent"}}
                        onClick={()=>{setBendFace(face);setBendFirst(null);}}>
                        {isFront?"▶ FRONT":"◀ BACK"}{isActive?" ✏️":""}
                      </div>
                      <svg width={svgW} height={svgH} style={{display:"block",
                        border:isActive?"1.5px solid "+C.accent:"1px solid "+C.border+"22",
                        borderRadius:6,cursor:isActive?"pointer":"default"}}>
                        {/* Tubes */}
                        {Array.from({length:Nt},(_,t)=>{
                          const y=oY+t*(tH+gap);
                          const pi=tubePass[t]||0;
                          const clr=circColors[pi%circColors.length];
                          return (
                            <g key={t}>
                              <rect x={oX} y={y} width={svgW-oX-10} height={tH} rx={3}
                                fill={clr} opacity={0.7} stroke={clr} strokeWidth={0.5}/>
                              <text x={oX-4} y={y+tH/2+3} textAnchor="end"
                                style={{fontSize:7,fill:C.dim}}>{t}</text>
                              <text x={svgW/2+10} y={y+tH/2+3} textAnchor="middle"
                                style={{fontSize:7,fill:"#fff",fontWeight:600}}>P{pi+1}</text>
                            </g>
                          );
                        })}
                        {/* Baffle clickable zones (between tubes) */}
                        {Array.from({length:Nt-1},(_,i)=>{
                          const y1=oY+i*(tH+gap)+tH;
                          const y2=oY+(i+1)*(tH+gap);
                          const yMid=(y1+y2)/2;
                          const hasBaf=faceBaf.includes(i);
                          return (
                            <g key={"b"+i} onClick={()=>onBafClick(i)}
                              style={{cursor:isActive?"pointer":"default"}}>
                              <rect x={oX-5} y={y1} width={svgW-oX} height={y2-y1}
                                fill="transparent"/>
                              {hasBaf?(
                                <line x1={oX-5} y1={yMid} x2={svgW-10} y2={yMid}
                                  stroke={C.warn} strokeWidth={2.5} strokeDasharray="4,2"/>
                              ):(
                                isActive&&<line x1={oX+5} y1={yMid} x2={svgW-15} y2={yMid}
                                  stroke={C.border} strokeWidth={0.5} strokeDasharray="2,4"/>
                              )}
                            </g>
                          );
                        })}
                        {/* Pass count label */}
                        <text x={svgW/2} y={12} textAnchor="middle"
                          style={{fontSize:8,fill:C.dim,fontWeight:700}}>{np}패스</text>
                      </svg>
                    </div>
                  );
                };

                return (
                  <div style={{borderLeft:"2px solid "+C.accent,paddingLeft:10,marginBottom:6,marginTop:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <span style={{fontSize:9,color:C.accent,fontWeight:700}}>MANIFOLD BAFFLE</span>
                      <span style={{fontSize:9,color:np>1?C.warn:C.success,fontWeight:600}}>
                        {np}패스 ({passes.map(p=>p.length).join("+")}튜브)
                      </span>
                    </div>
                    <div style={{display:"flex",gap:4,marginBottom:4}}>
                      <button onClick={resetBaffles} style={{padding:"3px 8px",borderRadius:4,
                        border:"1px solid "+C.accent,background:"transparent",color:C.accent,
                        fontSize:9,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>↩ 1패스(기본)</button>
                    </div>
                    <div style={{display:"flex",gap:0,marginBottom:4}}>
                      {["front","back"].map(f=>(
                        <button key={f} onClick={()=>{setBendFace(f);setBendFirst(null);}}
                          style={{flex:1,padding:"5px 0",border:"none",cursor:"pointer",
                            fontSize:10,fontWeight:700,fontFamily:"inherit",
                            borderBottom:bendFace===f?"2px solid "+C.accent:"1px solid "+C.border,
                            background:bendFace===f?C.accent+"15":C.bg,
                            color:bendFace===f?C.accent:C.dim,
                            borderRadius:bendFace===f?"6px 6px 0 0":"0"}}>
                          {f==="front"?"▶ FRONT":"◀ BACK"}
                          <span style={{fontSize:8,marginLeft:4,opacity:0.6}}>
                            ({(baf[f]||[]).length}배플)
                          </span>
                        </button>
                      ))}
                    </div>
                    <div style={{border:"1px solid "+C.accent+"33",borderRadius:"0 0 6px 6px",padding:4,background:C.bg+"88"}}>
                      {renderManifold(bendFace)}
                    </div>
                    <div style={{fontSize:8,color:C.dim,marginTop:3}}>
                      튜브 사이 클릭 = 배플 추가/제거 · FRONT/BACK 탭으로 매니폴드 전환
                    </div>
                  </div>
                );
              } catch(e) { console.error("MCHX baffle error:",e); return <div style={{color:"red",fontSize:10,padding:8}}>Baffle error: {String(e.message||e)}</div>; }
              })()}
            </InputGroup>
          )}

          <button onClick={run} disabled={loading} style={{
            width:"100%",padding:"14px 0",borderRadius:10,border:"none",
            cursor:loading?"wait":"pointer",fontWeight:800,fontSize:15,fontFamily:"inherit",
            letterSpacing:1,color:C.bg,
            background:loading?C.dim:`linear-gradient(135deg,${C.accent},${C.accent2})`,
            boxShadow:`0 4px 24px ${C.accent}33`}}>
            {loading?"⏳ Computing...":"▶ RUN SIMULATION"}
          </button>
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <button onClick={saveDefaults} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1px solid ${saveFlash?C.success:C.border}`,
              background:saveFlash?`${C.success}22`:C.card,color:saveFlash?C.success:C.accent,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",
              transition:"all 0.3s"}}>
              {saveFlash?"✅ Saved!":"💾 Save Default"}
            </button>
            <button onClick={resetDefaults} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1px solid ${C.border}`,
              background:C.card,color:C.dim,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>
              ↩ Reset Default
            </button>
          </div>
          {error&&<div style={{marginTop:12,padding:12,borderRadius:8,background:"#7f1d1d33",
            border:`1px solid ${C.err}`,fontSize:11,color:"#fca5a5",wordBreak:"break-all"}}>{error}</div>}
        </div>

        {/* RIGHT PANEL */}
        <div style={{flex:1,padding:20,overflowY:"auto",maxHeight:"calc(100vh - 60px)"}}>
          {!result?(
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",
              flexDirection:"column",gap:12}}>
              <div style={{fontSize:48}}>🔬</div>
              <div style={{color:C.dim,fontSize:14}}>Configure → <b style={{color:C.accent}}>RUN SIMULATION</b></div>
              <div style={{color:C.dim,fontSize:11,maxWidth:450,textAlign:"center",lineHeight:1.7}}>
                Level 2 Tube-Segment Model<br/>
                Nr×Nt×N_seg 세그먼트별 독립 계산, T_wall 반복 수렴<br/>
                FT-HX / MCHX 증발기·응축기 단품 해석
              </div>
            </div>
          ):(
            <>
              <div style={{display:"flex",gap:4,marginBottom:16}}>
                {["overview","contour","segments","charts"].map(t=>(
                  <button key={t} onClick={()=>setTab(t)} style={{
                    padding:"8px 16px",borderRadius:8,border:"none",cursor:"pointer",
                    fontFamily:"inherit",fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:1,
                    background:tab===t?mc:C.card,color:tab===t?C.bg:C.dim}}>{t}</button>
                ))}
              </div>

              {tab==="overview"&&(<>
                <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:16}}>
                  <Metric label="Q_total" value={result.Q_total.toFixed(1)} unit="W" color={mc}/>
                  <Metric label="Q_sensible" value={result.Q_sensible.toFixed(1)} unit="W" color={C.accent}/>
                  <Metric label="Q_latent" value={result.Q_latent.toFixed(1)} unit="W" color={C.accent2}/>
                  <Metric label="SHR" value={result.SHR.toFixed(3)} unit="-" color={C.warn}/>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:16}}>
                  <Metric label="T_air,out" value={result.T_air_out_C.toFixed(1)} unit="°C" color={C.success}/>
                  <Metric label="T_ref,out" value={result.T_ref_out_C.toFixed(1)} unit="°C" color={C.accent3}/>
                  <Metric label="x_ref,out" value={result.x_ref_out.toFixed(3)} unit="-" color={C.accent3}/>
                  {(()=>{
                    const dT = result.T_ref_out_C - result.T_sat_C;
                    if(mode==="evap" && dT > 0.1)
                      return <Metric label="과열도(SH)" value={dT.toFixed(1)} unit="K" color={C.err}/>;
                    if(mode==="cond" && dT < -0.1)
                      return <Metric label="과냉도(SC)" value={(-dT).toFixed(1)} unit="K" color={C.accent}/>;
                    if(mode==="evap" && result.x_ref_out < 1.0)
                      return <Metric label="상태" value="2상 출구" unit="" color={C.warn}/>;
                    if(mode==="cond" && result.x_ref_out > 0.0)
                      return <Metric label="상태" value="2상 출구" unit="" color={C.warn}/>;
                    return null;
                  })()}
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:16}}>
                  <Metric label="T_sat" value={result.T_sat_C.toFixed(1)} unit="°C" color={C.warn}/>
                  <Metric label="P_sat" value={result.P_sat_kPa.toFixed(0)} unit="kPa" color={C.warn}/>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:16}}>
                  <Metric label="ΔP_air" value={result.dp_air.toFixed(1)} unit="Pa" color={C.dim}/>
                  <Metric label="ΔP_ref" value={result.dp_ref>=1000?(result.dp_ref/1000).toFixed(2):result.dp_ref.toFixed(1)} unit={result.dp_ref>=1000?"kPa":"Pa"} color={C.warn}/>
                  <Metric label="RH_out" value={(result.RH_out*100).toFixed(1)} unit="%" color={C.accent2}/>
                </div>
                {/* Convergence info */}
                {result.convergence&&(()=>{
                  const cv = result.convergence;
                  const ok = cv.outer_converged;
                  const clr = ok ? C.success : C.warn;
                  return (
                    <div style={{padding:"8px 12px",marginBottom:16,borderRadius:8,
                      background:`${clr}11`,border:`1px solid ${clr}33`,fontSize:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                        <span style={{fontWeight:700,color:clr}}>{ok?"✅ 수렴":"⚠️ 미수렴"}</span>
                        <span style={{color:C.dim}}>
                          Outer: {cv.outer_iterations}/{cv.outer_max}회 · ΔQ={(cv.final_dQ||0).toFixed(2)}W ({(cv.final_dQ_pct||0).toFixed(2)}%)
                          · ΔT_air={(cv.final_dT||0).toFixed(3)}K
                        </span>
                        <span style={{color:C.dim}}>· Seg {cv.seg_converged_pct}% 수렴</span>
                      </div>
                      {cv.history&&cv.history.length>1&&(
                        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}>
                          {cv.history.map((h,i)=>(
                            <span key={i} style={{background:C.bg,padding:"2px 6px",borderRadius:4,fontSize:9,
                              color:h.dQ_pct<0.1?C.success:h.dQ_pct<1?C.warn:C.dim}}>
                              #{h.iter} Q={h.Q.toFixed(0)} ΔQ={h.dQ_pct.toFixed(2)}%
                            </span>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })()}
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:16}}>
                  <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:8,letterSpacing:1}}>CORRELATIONS USED</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8}}>
                    {Object.entries(result.correlations_used).map(([k,v])=>(
                      <span key={k} style={{background:C.bg,padding:"4px 10px",borderRadius:6,fontSize:11}}>
                        <span style={{color:C.dim}}>{k}:</span> {v}</span>
                    ))}
                  </div>
                  {/* Air-side selection reasoning */}
                  {(()=>{
                    const rec = result.correlation_recommendation;
                    if(!rec) return null;
                    const usedCorr = (result.correlations_used||{}).air_j;
                    const info = (rec.ranked||[]).find(r=>r.id===usedCorr);
                    const clr = (info||{}).status==="error"?C.err:(info||{}).status==="warning"?C.warn:C.success;
                    const isAuto = airCorr.mode==="auto";
                    return (
                      <div style={{padding:"8px 10px",borderRadius:6,background:`${clr}11`,border:`1px solid ${clr}22`}}>
                        <div style={{fontSize:10,fontWeight:700,color:clr,marginBottom:4}}>
                          {isAuto?"⚡ 자동 선택":"🔧 수동 선택"}: {(info||{}).name||usedCorr}
                          <span style={{fontWeight:400,color:C.dim}}> — {(info||{}).in_range||"?"} 항목 유효, Re_Dc={result.Re_Dc}</span>
                        </div>
                        {isAuto&&(rec.reasons||[]).map((r,i)=>
                          <div key={i} style={{fontSize:9,color:C.dim,marginTop:1}}>• {r}</div>
                        )}
                        {!isAuto&&info&&info.warnings&&info.warnings.length>0&&(
                          <div style={{marginTop:3}}>
                            {info.warnings.map((w,i)=>
                              <div key={i} style={{fontSize:9,color:w.severity==="error"?C.err:C.warn}}>
                                {w.severity==="error"?"🚫":"⚠️"} {w.param}: {w.value} (범위 {w.range})
                              </div>
                            )}
                          </div>
                        )}
                        {info&&info.note&&<div style={{fontSize:9,color:C.dim,marginTop:3,fontStyle:"italic"}}>{info.note}</div>}
                      </div>
                    );
                  })()}
                  {/* f-factor selection info */}
                  {(()=>{
                    const fRec = result.f_recommendation;
                    if(!fRec) return null;
                    const usedF = (result.correlations_used||{}).air_f;
                    const fInfo = (fRec.ranked||[]).find(r=>r.id===usedF);
                    const fVal = (result.correlations_used||{}).f_value;
                    const isAutoF = fCorr.mode==="auto";
                    return usedF?(
                      <div style={{padding:"8px 10px",borderRadius:6,marginTop:6,background:`${C.accent2}11`,border:`1px solid ${C.accent2}22`}}>
                        <div style={{fontSize:10,fontWeight:700,color:C.accent2,marginBottom:2}}>
                          {isAutoF?"⚡":"🔧"} f-factor: {(fInfo||{}).name||usedF}
                          <span style={{fontWeight:400,color:C.dim}}> — f = {fVal}</span>
                        </div>
                        {fInfo&&fInfo.note&&<div style={{fontSize:9,color:C.dim,fontStyle:"italic"}}>{fInfo.note}</div>}
                      </div>
                    ):null;
                  })()}
                </div>
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                  <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:6,letterSpacing:1}}>ROW Q DISTRIBUTION</div>
                  <BarChart data={rowData} dataKey="Q" nameKey="name" color={mc}/>
                </div>
              </>)}

              {tab==="contour"&&(()=>{
                const segs = result.segments || [];
                if(segs.length===0) return <div style={{color:C.dim,fontSize:12}}>No segment data</div>;

                // Collect unique indices
                const allRows = [...new Set(segs.map(s=>s.row))].sort((a,b)=>a-b);
                const allTubes = [...new Set(segs.map(s=>s.tube))].sort((a,b)=>a-b);
                const allSegs = [...new Set(segs.map(s=>s.seg))].sort((a,b)=>a-b);

                // Variable options
                const vars = {
                  T_wall:{label:"T_wall [°C]",key:"T_wall",fmt:v=>v.toFixed(1)},
                  T_air:{label:"T_air [°C]",key:"T_air_local",fmt:v=>v.toFixed(1)},
                  T_ref:{label:"T_ref [°C]",key:"T_ref",fmt:v=>v.toFixed(1)},
                  Q:{label:"Q [W]",key:"Q",fmt:v=>v.toFixed(1)},
                  x_ref:{label:"x_ref [-]",key:"x_ref",fmt:v=>v.toFixed(3)},
                  h_i:{label:"h_i [W/m²K]",key:"h_i",fmt:v=>v.toFixed(0)},
                  h_o:{label:"h_o [W/m²K]",key:"h_o",fmt:v=>v.toFixed(0)},
                  eta_o:{label:"η_o [-]",key:"eta_o",fmt:v=>v.toFixed(3)},
                  dp_ref:{label:"ΔP_ref [Pa]",key:"dp_ref",fmt:v=>v.toFixed(1)},
                };
                const cv = vars[contourVar] || vars.T_wall;

                // Build grid based on view mode
                let gridRows, gridCols, rowLabels, colLabels, axisY, axisX, subtitle, filtered;
                const safeIdx = Math.max(0, contourIdx);

                if(contourView==="byRow"){
                  const ri = Math.min(safeIdx, allRows.length-1);
                  const selectedRow = allRows[ri];
                  filtered = segs.filter(s=>s.row===selectedRow);
                  gridRows = allTubes;
                  gridCols = allSegs;
                  rowLabels = allTubes.map(t=>`T${t}`);
                  colLabels = allSegs.map(s=>`S${s}`);
                  axisY = "Tube (Column)";
                  axisX = "← Segment along tube →";
                  subtitle = `Row ${selectedRow} · ${gridRows.length} tubes × ${gridCols.length} segs`;
                } else if(contourView==="byCol"){
                  const ti = Math.min(safeIdx, allTubes.length-1);
                  const selectedTube = allTubes[ti];
                  filtered = segs.filter(s=>s.tube===selectedTube);
                  gridRows = allRows;
                  gridCols = allSegs;
                  rowLabels = allRows.map(r=>`R${r}`);
                  colLabels = allSegs.map(s=>`S${s}`);
                  axisY = "Row (airflow →)";
                  axisX = "← Segment along tube →";
                  subtitle = `Tube ${selectedTube} · ${gridRows.length} rows × ${gridCols.length} segs`;
                } else {
                  // full: rows × segs, tube 0
                  filtered = segs.filter(s=>s.tube===allTubes[0]);
                  gridRows = allRows;
                  gridCols = allSegs;
                  rowLabels = allRows.map(r=>`R${r}`);
                  colLabels = allSegs.map(s=>`S${s}`);
                  axisY = "Row (airflow →)";
                  axisX = "← Segment along tube →";
                  subtitle = `Tube 0 · ${gridRows.length} rows × ${gridCols.length} segs`;
                }

                const Nrow = gridRows.length, Ncol = gridCols.length;

                // Build 2D value array
                const grid = [];
                let vMin=Infinity, vMax=-Infinity;
                for(let ri=0;ri<Nrow;ri++){
                  const rowArr=[];
                  for(let ci=0;ci<Ncol;ci++){
                    let seg;
                    if(contourView==="byRow"){
                      seg = filtered.find(s=>s.tube===gridRows[ri]&&s.seg===gridCols[ci]);
                    } else {
                      seg = filtered.find(s=>s.row===gridRows[ri]&&s.seg===gridCols[ci]);
                    }
                    const val = seg ? seg[cv.key] : 0;
                    rowArr.push(val);
                    if(val<vMin) vMin=val;
                    if(val>vMax) vMax=val;
                  }
                  grid.push(rowArr);
                }
                const vRange = vMax-vMin || 1;

                // Color interpolation
                function valToColor(v){
                  const t = Math.max(0,Math.min(1,(v-vMin)/vRange));
                  const stops = [
                    [0.0, [30,70,200]],[0.25,[30,180,220]],[0.5, [50,200,80]],
                    [0.75,[240,200,40]],[1.0, [220,50,40]],
                  ];
                  let i=0;
                  for(;i<stops.length-1;i++) if(t<=stops[i+1][0]) break;
                  const [t0,c0]=stops[i], [t1,c1]=stops[Math.min(i+1,stops.length-1)];
                  const f = t1>t0 ? (t-t0)/(t1-t0) : 0;
                  return `rgb(${Math.round(c0[0]+(c1[0]-c0[0])*f)},${Math.round(c0[1]+(c1[1]-c0[1])*f)},${Math.round(c0[2]+(c1[2]-c0[2])*f)})`;
                }

                // SVG layout
                const pad={top:45,bottom:50,left:55,right:20};
                const cellW=Math.min(56,Math.max(30,(520-pad.left-pad.right)/Math.max(Ncol,1)));
                const cellH=Math.min(50,Math.max(28,(340-pad.top-pad.bottom)/Math.max(Nrow,1)));
                const svgW=pad.left+Ncol*cellW+pad.right+80;
                const svgH=pad.top+Nrow*cellH+pad.bottom;
                const cbX=pad.left+Ncol*cellW+20, cbW=14, cbH=Math.max(Nrow*cellH,60);
                const cbStops=20;

                // Slider range
                const sliderMax = contourView==="byRow"?allRows.length-1:contourView==="byCol"?allTubes.length-1:0;
                const sliderLabel = contourView==="byRow"?`Row ${allRows[Math.min(safeIdx,allRows.length-1)]}`:
                                    contourView==="byCol"?`Tube ${allTubes[Math.min(safeIdx,allTubes.length-1)]}`:"";

                return (
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                    {/* Header: view mode + variable + info */}
                    <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:8,marginBottom:10}}>
                      <div style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:1}}>HX CONTOUR</div>
                      {/* View mode buttons */}
                      {[{k:"full",l:"전체"},{k:"byRow",l:"Row별"},{k:"byCol",l:"Column별"}].map(v=>(
                        <button key={v.k} onClick={()=>{setContourView(v.k);setContourIdx(0);}}
                          style={{padding:"4px 10px",borderRadius:6,border:"none",cursor:"pointer",
                            fontSize:10,fontWeight:700,fontFamily:"inherit",
                            background:contourView===v.k?mc:C.bg,
                            color:contourView===v.k?C.bg:C.dim}}>
                          {v.l}
                        </button>
                      ))}
                      <select value={contourVar} onChange={e=>setContourVar(e.target.value)}
                        style={{background:C.bg,color:C.text,border:`1px solid ${C.border}`,
                          borderRadius:6,padding:"4px 8px",fontSize:11,fontFamily:"inherit"}}>
                        {Object.entries(vars).map(([k,v])=>
                          <option key={k} value={k}>{v.label}</option>
                        )}
                      </select>
                    </div>

                    {/* Slider for byRow/byCol */}
                    {contourView!=="full"&&(
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,
                        padding:"8px 12px",background:C.bg,borderRadius:8}}>
                        <span style={{fontSize:11,fontWeight:700,color:mc,minWidth:60}}>{sliderLabel}</span>
                        <input type="range" min={0} max={sliderMax} value={Math.min(safeIdx,sliderMax)}
                          onChange={e=>setContourIdx(parseInt(e.target.value))}
                          style={{flex:1,accentColor:mc}}/>
                        {/* Quick-step buttons */}
                        <button onClick={()=>setContourIdx(i=>Math.max(0,i-1))}
                          style={{padding:"3px 8px",borderRadius:4,border:`1px solid ${C.border}`,
                            background:C.card,color:C.text,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>◀</button>
                        <button onClick={()=>setContourIdx(i=>Math.min(sliderMax,i+1))}
                          style={{padding:"3px 8px",borderRadius:4,border:`1px solid ${C.border}`,
                            background:C.card,color:C.text,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>▶</button>
                      </div>
                    )}

                    <div style={{fontSize:10,color:C.dim,marginBottom:6}}>{subtitle}</div>

                    <div style={{overflowX:"auto"}}>
                      <svg width={svgW} height={svgH} style={{display:"block"}}>
                        {/* Title */}
                        <text x={pad.left+Ncol*cellW/2} y={16} textAnchor="middle"
                          style={{fontSize:12,fill:C.text,fontWeight:700}}>{cv.label}</text>

                        {/* Air flow arrow (only for views with row axis) */}
                        {(contourView!=="byRow")&&(<>
                          <defs>
                            <marker id="arrowC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                              <polygon points="0 0, 8 3, 0 6" fill={C.accent}/>
                            </marker>
                          </defs>
                          <line x1={14} y1={pad.top+Nrow*cellH/2-20} x2={14} y2={pad.top+Nrow*cellH/2+20}
                            stroke={C.accent} strokeWidth={2} markerEnd="url(#arrowC)"/>
                          <text x={14} y={pad.top+Nrow*cellH/2-26} textAnchor="middle"
                            style={{fontSize:9,fill:C.accent,fontWeight:700}}>AIR</text>
                        </>)}

                        {/* Ref flow arrow (horizontal, for all views) */}
                        <defs>
                          <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                            <polygon points="0 0, 8 3, 0 6" fill={C.accent3}/>
                          </marker>
                        </defs>
                        <line x1={pad.left} y1={pad.top-8} x2={pad.left+Ncol*cellW-10} y2={pad.top-8}
                          stroke={C.accent3} strokeWidth={1.5} markerEnd="url(#arrowR)" strokeDasharray="4,3"/>
                        <text x={pad.left+Ncol*cellW} y={pad.top-5} textAnchor="end"
                          style={{fontSize:8,fill:C.accent3,fontWeight:600}}>REF</text>

                        {/* Heatmap cells */}
                        {grid.map((row,ri)=>
                          row.map((val,ci)=>{
                            const x=pad.left+ci*cellW, y=pad.top+ri*cellH;
                            const col=valToColor(val);
                            return (
                              <g key={`${ri}-${ci}`}>
                                <rect x={x} y={y} width={cellW} height={cellH}
                                  fill={col} stroke={C.bg} strokeWidth={1} rx={2}/>
                                <text x={x+cellW/2} y={y+cellH/2+4} textAnchor="middle"
                                  style={{fontSize:cellW>38?9:7,fill:"#fff",fontWeight:600,
                                    textShadow:"0 0 3px rgba(0,0,0,0.8)"}}>
                                  {cv.fmt(val)}
                                </text>
                              </g>
                            );
                          })
                        )}

                        {/* Row labels */}
                        {rowLabels.map((lbl,ri)=>(
                          <text key={`rl${ri}`} x={pad.left-6} y={pad.top+ri*cellH+cellH/2+4}
                            textAnchor="end" style={{fontSize:10,fill:C.dim}}>{lbl}</text>
                        ))}
                        {/* Col labels */}
                        {colLabels.map((lbl,ci)=>(
                          <text key={`cl${ci}`} x={pad.left+ci*cellW+cellW/2} y={pad.top+Nrow*cellH+14}
                            textAnchor="middle" style={{fontSize:10,fill:C.dim}}>{lbl}</text>
                        ))}
                        {/* Axis labels */}
                        <text x={pad.left+Ncol*cellW/2} y={pad.top+Nrow*cellH+32}
                          textAnchor="middle" style={{fontSize:10,fill:C.dim,fontWeight:600}}>{axisX}</text>
                        <text x={28} y={pad.top+Nrow*cellH/2} textAnchor="middle"
                          transform={`rotate(-90,28,${pad.top+Nrow*cellH/2})`}
                          style={{fontSize:10,fill:C.dim,fontWeight:600}}>{axisY}</text>

                        {/* Color bar */}
                        {Array.from({length:cbStops}).map((_,i)=>{
                          const t = 1 - i/(cbStops-1);
                          const val = vMin + t*vRange;
                          const y = pad.top + i*(cbH/cbStops);
                          return (
                            <rect key={`cb${i}`} x={cbX} y={y} width={cbW} height={cbH/cbStops+1}
                              fill={valToColor(val)} stroke="none"/>
                          );
                        })}
                        <rect x={cbX} y={pad.top} width={cbW} height={cbH}
                          fill="none" stroke={C.border} strokeWidth={1} rx={2}/>
                        <text x={cbX+cbW+4} y={pad.top+8} style={{fontSize:8,fill:C.text}}>{cv.fmt(vMax)}</text>
                        <text x={cbX+cbW+4} y={pad.top+cbH} style={{fontSize:8,fill:C.text}}>{cv.fmt(vMin)}</text>
                        <text x={cbX+cbW+4} y={pad.top+cbH/2+3} style={{fontSize:8,fill:C.dim}}>{cv.fmt((vMin+vMax)/2)}</text>
                      </svg>
                    </div>

                    {/* Summary stats */}
                    <div style={{display:"flex",flexWrap:"wrap",gap:12,marginTop:10,padding:"8px 10px",
                      background:C.bg,borderRadius:6,fontSize:11}}>
                      <span><span style={{color:C.dim}}>Min:</span> <span style={{color:valToColor(vMin),fontWeight:700}}>{cv.fmt(vMin)}</span></span>
                      <span><span style={{color:C.dim}}>Max:</span> <span style={{color:valToColor(vMax),fontWeight:700}}>{cv.fmt(vMax)}</span></span>
                      <span><span style={{color:C.dim}}>Δ:</span> {cv.fmt(vRange)}</span>
                      <span><span style={{color:C.dim}}>Mean:</span> {cv.fmt(filtered.reduce((s,v)=>s+v[cv.key],0)/filtered.length)}</span>
                    </div>
                  </div>
                );
              })()}

              {tab==="segments"&&(
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14,overflowX:"auto"}}>
                  <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:10,letterSpacing:1}}>SEGMENT DETAILS (Tube 0)</div>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>
                      {["Row","Seg","Q [W]","T_wall","T_air","x_ref","h_i","h_o","η_o","ΔP_ref","Wet","✓"].map(h=>
                        <th key={h} style={{padding:"6px 8px",textAlign:"right",color:C.dim,fontWeight:600}}>{h}</th>
                      )}</tr></thead>
                    <tbody>
                      {result.segments.filter(s=>s.tube===0).map((s,i)=>(
                        <tr key={i} style={{borderBottom:`1px solid ${C.border}22`,background:i%2?`${C.bg}55`:"transparent"}}>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.row}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.seg}</td>
                          <td style={{padding:"5px 8px",textAlign:"right",color:mc,fontWeight:600}}>{s.Q.toFixed(1)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.T_wall.toFixed(1)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.T_air_local.toFixed(1)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.x_ref.toFixed(3)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.h_i.toFixed(0)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.h_o.toFixed(0)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.eta_o.toFixed(3)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right",color:C.warn}}>{s.dp_ref.toFixed(1)}</td>
                          <td style={{padding:"5px 8px",textAlign:"center"}}>{s.is_wet?"💧":"—"}</td>
                          <td style={{padding:"5px 8px",textAlign:"center",color:s.converged?C.success:C.err}}>{s.converged?"✓":"✗"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              {tab==="charts"&&(
                <div style={{display:"flex",flexDirection:"column",gap:16}}>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                    <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:6,letterSpacing:1}}>Q PER SEGMENT (Tube 0)</div>
                    <BarChart data={segData} dataKey="Q" nameKey="name" color={mc} height={200}/>
                  </div>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                    <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:6,letterSpacing:1}}>T_WALL & QUALITY</div>
                    <LineChartSVG data={segData} height={220} lines={[
                      {key:"T_wall",color:C.warn,label:"T_wall [°C]"},
                      {key:"x",color:C.accent3,label:"x_ref",min:0,max:1.2}
                    ]}/>
                  </div>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                    <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:6,letterSpacing:1}}>h_i & η_o</div>
                    <LineChartSVG data={segData} height={220} lines={[
                      {key:"h_i",color:C.accent,label:"h_i [W/m²K]"},
                      {key:"eta_o",color:C.success,label:"η_o",min:0,max:1}
                    ]}/>
                  </div>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                    <div style={{fontSize:11,color:C.warn,fontWeight:700,marginBottom:6,letterSpacing:1}}>ΔP_ref PER SEGMENT (Tube 0)</div>
                    <BarChart data={segData} dataKey="dp_ref" nameKey="name" color={C.warn} height={200}/>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

try {
  class EB extends React.Component {
    constructor(p){super(p);this.state={err:null};}
    static getDerivedStateFromError(e){return{err:e};}
    componentDidCatch(e,info){console.error("React Error:",e,info);}
    render(){
      if(this.state.err) return React.createElement("div",{style:{color:"red",padding:20,fontFamily:"monospace",whiteSpace:"pre-wrap",fontSize:11}},
        "REACT ERROR: "+this.state.err.message+"\n\n"+this.state.err.stack+
        "\n\nTry: localStorage.removeItem('hxsim_defaults') then reload");
      return this.props.children;
    }
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<EB><App/></EB>);
} catch(e) {
  document.getElementById("root").innerHTML = 
    '<div style="color:red;padding:20px;font-family:monospace;white-space:pre-wrap;font-size:12px">' +
    'RENDER ERROR: ' + e.message + '\n' + e.stack + '</div>';
  console.error("HX-Sim render error:", e);
}
</script>
</body>
</html>
