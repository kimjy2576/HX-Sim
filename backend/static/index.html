<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❄️ HX Simulator v7.9-L2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;color:#e2e8f0;font-family:'JetBrains Mono','SF Mono','Fira Code','Courier New',monospace}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#111827}
::-webkit-scrollbar-thumb{background:#2a3a52;border-radius:3px}
input,select{font-family:inherit}
input:focus,select:focus{border-color:#38bdf8!important;outline:none}
button:hover{opacity:0.9}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useCallback, useEffect} = React;

const API_URL = window.location.origin;

const DEFAULT_FT = {
  W:0.5,H:0.3,D:0.08,Do:0.00952,Di:0.00822,Pt:0.0254,Pl:0.022,
  Nr:4,Nt:12,layout:"staggered",FPI:14,fin_thickness:0.00012,
  fin_type:"plain",k_fin:200,louver_pitch:0.0017,louver_angle:27,N_seg:5
};
const DEFAULT_MCHX = {
  W:0.6,H:0.4,D:0.02,n_slabs:1,ch_width:0.001,ch_height:0.0015,
  ch_wall:0.0003,n_ports:12,tube_height:0.002,tube_pitch:0.01,
  louver_pitch:0.0013,louver_angle:27,fin_pitch:0.0014,fin_thickness:0.0001,
  fin_height:0.008,k_fin:200,N_seg:5,N_tubes:40
};
const REFRIGERANTS = ["R410A","R134a","R32","R290","R1234yf","R22","R407C","R404A","R513A","R454C"];

const C = {
  bg:"#0a0e17",surface:"#111827",card:"#1a2233",border:"#2a3a52",
  accent:"#38bdf8",accent2:"#818cf8",accent3:"#f472b6",
  warn:"#fbbf24",success:"#34d399",err:"#ef4444",
  text:"#e2e8f0",dim:"#94a3b8"
};

/* ===== Pure CSS Bar Chart ===== */
function BarChart({data, dataKey, nameKey, color, height=180}) {
  if (!data||data.length===0) return null;
  const maxVal = Math.max(...data.map(d=>Math.abs(d[dataKey])||0), 1);
  return (
    <div style={{height,display:"flex",alignItems:"flex-end",gap:4,padding:"10px 0"}}>
      {data.map((d,i)=>{
        const val = d[dataKey]||0;
        const h = Math.max((Math.abs(val)/maxVal)*(height-40),2);
        return (
          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <span style={{fontSize:9,color:C.dim}}>{Math.round(val)}</span>
            <div style={{width:"100%",maxWidth:60,height:h,background:color||C.accent,
              borderRadius:"4px 4px 0 0",opacity:0.7+0.3*(1-i/data.length),
              transition:"height 0.3s"}}/>
            <span style={{fontSize:9,color:C.dim}}>{d[nameKey]}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ===== Pure SVG Line Chart ===== */
function LineChartSVG({data, lines, height=200}) {
  if (!data||data.length<2) return null;
  const W=600,H=height-40,pad=40;
  const pw=(W-2*pad)/(data.length-1);
  return (
    <svg viewBox={`0 0 ${W} ${height}`} style={{width:"100%",height}}>
      {[0,0.25,0.5,0.75,1].map(f=>(
        <line key={f} x1={pad} x2={W-pad} y1={pad+H*(1-f)} y2={pad+H*(1-f)}
          stroke={C.border} strokeWidth={0.5} strokeDasharray="4 4"/>
      ))}
      {lines.map(({key,color,label,min,max})=>{
        const vals=data.map(d=>d[key]||0);
        const lo=min!==undefined?min:Math.min(...vals);
        const hi=max!==undefined?max:Math.max(...vals);
        const range=hi-lo||1;
        const pts=data.map((d,i)=>`${pad+i*pw},${pad+H*(1-(((d[key]||0)-lo)/range))}`).join(" ");
        return (
          <g key={key}>
            <polyline points={pts} fill="none" stroke={color} strokeWidth={2}/>
            {data.map((d,i)=>{
              const x=pad+i*pw,y=pad+H*(1-(((d[key]||0)-lo)/range));
              return <circle key={i} cx={x} cy={y} r={3} fill={color}/>;
            })}
            <text x={W-pad+5} y={pad+H*(1-((vals[vals.length-1]-lo)/range))}
              fill={color} fontSize={10} dominantBaseline="middle">{label}</text>
          </g>
        );
      })}
      {data.map((d,i)=>(
        <text key={i} x={pad+i*pw} y={height-5} fill={C.dim} fontSize={8}
          textAnchor="middle">{d.name}</text>
      ))}
    </svg>
  );
}

/* ===== UI Components ===== */
function InputGroup({label,children}) {
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:C.accent,marginBottom:10}}>{label}</div>
      {children}
    </div>
  );
}
function Field({label,unit,value,onChange,type="number",options,step,min,max}) {
  const row={display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,gap:8};
  const inp={background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 8px",fontSize:13,width:100,textAlign:"right"};
  if(options) return (
    <div style={row}><span style={{fontSize:12,color:C.dim}}>{label}</span>
    <select value={value} onChange={e=>onChange(e.target.value)} style={{...inp,width:120,textAlign:"left",cursor:"pointer"}}>
      {options.map(o=><option key={o} value={o}>{o}</option>)}</select></div>);
  return (
    <div style={row}>
      <span style={{fontSize:12,color:C.dim}}>{label} {unit&&<span style={{color:C.accent,fontSize:10}}>[{unit}]</span>}</span>
      <input type={type} value={value} step={step||"any"} min={min} max={max}
        onChange={e=>onChange(type==="number"?parseFloat(e.target.value)||0:e.target.value)} style={inp}/>
    </div>);
}
function Metric({label,value,unit,color=C.accent}) {
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 16px",
      flex:"1 1 140px",minWidth:140,borderTop:`3px solid ${color}`}}>
      <div style={{fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:1}}>{label}</div>
      <div style={{fontSize:22,fontWeight:700,color,marginTop:4}}>
        {value} <span style={{fontSize:11,color:C.dim}}>{unit}</span>
      </div>
    </div>);
}

/* ===== Main App ===== */
function App() {
  const [hxType,setHxType]=useState("FT");
  const [mode,setMode]=useState("evap");
  const [airIn,setAirIn]=useState({T:35,RH:0.5,flowMode:"velocity",V:2.0,CMM:null});
  const [refIn,setRefIn]=useState({fluid:"R410A",stateMode:"T",T_sat:7,P_sat:null,m_ref:0.02,twoPhase:true,x_in:0.2,T_ref_in:null});
  const [flow,setFlow]=useState("counter");
  const [ftSpec,setFtSpec]=useState({...DEFAULT_FT});
  const [mchxSpec,setMchxSpec]=useState({...DEFAULT_MCHX});
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [tab,setTab]=useState("overview");
  const [serverOk,setServerOk]=useState(null);

  useEffect(()=>{
    fetch(API_URL+"/api").then(r=>r.json()).then(()=>setServerOk(true)).catch(()=>setServerOk(false));
  },[]);

  const uA=(k,v)=>setAirIn(p=>({...p,[k]:v}));
  const uR=(k,v)=>setRefIn(p=>({...p,[k]:v}));
  const uF=(k,v)=>setFtSpec(p=>({...p,[k]:v}));
  const uM=(k,v)=>setMchxSpec(p=>({...p,[k]:v}));

  const run=useCallback(async()=>{
    setLoading(true);setError("");
    try {
      const body={hx_type:hxType,mode,T_air_in_C:airIn.T,RH_in:airIn.RH,
        air_flow_mode:airIn.flowMode,
        fluid:refIn.fluid,m_ref:refIn.m_ref,flow_arrangement:flow,
        two_phase_inlet:refIn.twoPhase,x_in:refIn.x_in};
      if(airIn.flowMode==="velocity") body.V_air=airIn.V; else body.CMM=airIn.CMM||18;
      if(refIn.stateMode==="T") body.T_sat_C=refIn.T_sat; else body.P_sat_kPa=refIn.P_sat;
      if(!refIn.twoPhase&&refIn.T_ref_in!==null) body.T_ref_in_C=refIn.T_ref_in;
      if(hxType==="FT") body.ft_spec=ftSpec; else body.mchx_spec=mchxSpec;
      const res=await fetch(`${API_URL}/simulate`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(!res.ok){const e=await res.json();throw new Error(e.detail||"Failed");}
      setResult(await res.json());setTab("overview");
    }catch(e){setError(e.message);}finally{setLoading(false);}
  },[hxType,mode,airIn,refIn,flow,ftSpec,mchxSpec]);

  const segData=result?.segments?.filter(s=>s.tube===0)?.map(s=>({
    name:`R${s.row}S${s.seg}`,Q:s.Q,T_wall:s.T_wall,h_i:s.h_i,x:s.x_ref,eta_o:s.eta_o
  }))||[];
  const rowData=result?.row_Q?.map((q,i)=>({name:`R${i}`,Q:q}))||[];
  const mc=mode==="evap"?C.accent:C.accent3;

  return (
    <div style={{minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${C.surface},${C.card})`,
        borderBottom:`1px solid ${C.border}`,padding:"16px 24px",display:"flex",alignItems:"center",gap:16}}>
        <div style={{fontSize:20,fontWeight:800}}>
          <span style={{color:C.accent}}>❄️</span> HX Simulator
          <span style={{color:C.dim,fontSize:11,marginLeft:8}}>v7.9-L2</span>
        </div>
        <div style={{flex:1}}/>
        {serverOk!==null&&(
          <div style={{fontSize:11,color:serverOk?C.success:C.err,display:"flex",alignItems:"center",gap:6}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:serverOk?C.success:C.err,display:"inline-block"}}/>
            {serverOk?"Backend Connected":"Backend Offline"}
          </div>
        )}
        <div style={{fontSize:10,color:C.dim,textAlign:"right",lineHeight:1.4}}>
          Chen · Kim&Mudawar · Shah<br/>Gnielinski · Wang · Chang&Wang
        </div>
      </div>

      <div style={{display:"flex",minHeight:"calc(100vh - 60px)"}}>
        {/* LEFT PANEL */}
        <div style={{width:320,flexShrink:0,padding:16,borderRight:`1px solid ${C.border}`,
          overflowY:"auto",maxHeight:"calc(100vh - 60px)"}}>

          <InputGroup label="Configuration">
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              {["FT","MCHX"].map(t=>(
                <button key={t} onClick={()=>setHxType(t)} style={{flex:1,padding:"8px 0",borderRadius:8,
                  border:"none",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit",
                  background:hxType===t?C.accent:C.bg,color:hxType===t?C.bg:C.dim}}>
                  {t==="FT"?"🔧 Fin-Tube":"⚡ MCHX"}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:6}}>
              {["evap","cond"].map(m=>(
                <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"8px 0",borderRadius:8,
                  border:"none",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit",
                  background:mode===m?mc:C.bg,color:mode===m?C.bg:C.dim}}>
                  {m==="evap"?"❄️ Evaporator":"🔥 Condenser"}</button>
              ))}
            </div>
            <div style={{marginTop:8}}>
              <Field label="Flow" options={["counter","parallel"]} value={flow} onChange={setFlow}/>
            </div>
          </InputGroup>

          <InputGroup label="🌀 Air Inlet">
            <Field label="T_air" unit="°C" value={airIn.T} onChange={v=>uA("T",v)}/>
            <Field label="RH" unit="-" value={airIn.RH} onChange={v=>uA("RH",v)} step={0.05} min={0} max={1}/>
            {/* Velocity / CMM toggle */}
            <div style={{display:"flex",gap:4,marginBottom:8,marginTop:4}}>
              {["velocity","CMM"].map(m=>(
                <button key={m} onClick={()=>uA("flowMode",m)} style={{
                  flex:1,padding:"5px 0",borderRadius:6,border:"none",cursor:"pointer",
                  fontWeight:700,fontSize:11,fontFamily:"inherit",
                  background:airIn.flowMode===m?C.success:C.bg,color:airIn.flowMode===m?C.bg:C.dim}}>
                  {m==="velocity"?"🌬 Velocity":"📦 CMM"}</button>
              ))}
            </div>
            {airIn.flowMode==="velocity" ?
              <Field label="V_face" unit="m/s" value={airIn.V} onChange={v=>uA("V",v)}/> :
              <Field label="CMM" unit="m³/min" value={airIn.CMM||18} onChange={v=>uA("CMM",v)}/>
            }
            {result&&(
              <div style={{fontSize:10,color:C.dim,marginBottom:2,paddingLeft:4}}>
                → {airIn.flowMode==="velocity" ?
                  `CMM = ${result.CMM?.toFixed(2)} m³/min` :
                  `V_face = ${result.V_air?.toFixed(3)} m/s`}
              </div>
            )}
          </InputGroup>

          <InputGroup label="🧊 Refrigerant">
            <Field label="Fluid" options={REFRIGERANTS} value={refIn.fluid} onChange={v=>uR("fluid",v)}/>
            {/* T / P toggle */}
            <div style={{display:"flex",gap:4,marginBottom:8,marginTop:4}}>
              {["T","P"].map(m=>(
                <button key={m} onClick={()=>uR("stateMode",m)} style={{
                  flex:1,padding:"5px 0",borderRadius:6,border:"none",cursor:"pointer",
                  fontWeight:700,fontSize:11,fontFamily:"inherit",
                  background:refIn.stateMode===m?C.warn:C.bg,color:refIn.stateMode===m?C.bg:C.dim}}>
                  {m==="T"?"🌡 Temperature":"📊 Pressure"}</button>
              ))}
            </div>
            {refIn.stateMode==="T" ?
              <Field label="T_sat" unit="°C" value={refIn.T_sat} onChange={v=>uR("T_sat",v)}/> :
              <Field label="P_sat" unit="kPa" value={refIn.P_sat||1000} onChange={v=>uR("P_sat",v)}/>
            }
            {/* Show resolved counterpart from last result */}
            {result&&(
              <div style={{fontSize:10,color:C.dim,marginBottom:6,paddingLeft:4}}>
                → {refIn.stateMode==="T" ?
                  `P_sat = ${result.P_sat_kPa?.toFixed(1)} kPa` :
                  `T_sat = ${result.T_sat_C?.toFixed(2)} °C`}
              </div>
            )}
            <Field label="ṁ_ref" unit="kg/s" value={refIn.m_ref} onChange={v=>uR("m_ref",v)} step={0.001}/>
            {/* Two-phase checkbox */}
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6,marginBottom:6}}>
              <input type="checkbox" id="tp" checked={refIn.twoPhase}
                onChange={e=>uR("twoPhase",e.target.checked)}
                style={{width:16,height:16,accentColor:C.accent,cursor:"pointer"}}/>
              <label htmlFor="tp" style={{fontSize:12,color:refIn.twoPhase?C.text:C.dim,cursor:"pointer"}}>
                2상 입구 (Two-Phase Inlet)
              </label>
            </div>
            {refIn.twoPhase ?
              <Field label="x_in" unit="-" value={refIn.x_in} onChange={v=>uR("x_in",v)} step={0.05}/> :
              <Field label="T_ref,in" unit="°C" value={refIn.T_ref_in||refIn.T_sat-5}
                onChange={v=>uR("T_ref_in",v)}/>
            }
          </InputGroup>

          {hxType==="FT"?(
            <InputGroup label="📐 FT Geometry">
              <Field label="W" unit="m" value={ftSpec.W} onChange={v=>uF("W",v)}/>
              <Field label="H" unit="m" value={ftSpec.H} onChange={v=>uF("H",v)}/>
              <Field label="Do" unit="mm" value={Math.round(ftSpec.Do*1e5)/100} onChange={v=>uF("Do",v/1000)}/>
              <Field label="Di" unit="mm" value={Math.round(ftSpec.Di*1e5)/100} onChange={v=>uF("Di",v/1000)}/>
              <Field label="Pt" unit="mm" value={Math.round(ftSpec.Pt*1e4)/10} onChange={v=>uF("Pt",v/1000)}/>
              <Field label="Pl" unit="mm" value={Math.round(ftSpec.Pl*1e4)/10} onChange={v=>uF("Pl",v/1000)}/>
              <Field label="Nr" unit="rows" value={ftSpec.Nr} onChange={v=>uF("Nr",parseInt(v)||1)}/>
              <Field label="Nt" unit="tubes" value={ftSpec.Nt} onChange={v=>uF("Nt",parseInt(v)||1)}/>
              <Field label="FPI" unit="fins/in" value={ftSpec.FPI} onChange={v=>uF("FPI",v)}/>
              <Field label="Fin" options={["plain","wavy","louver","slit"]} value={ftSpec.fin_type} onChange={v=>uF("fin_type",v)}/>
              <Field label="N_seg" unit="/tube" value={ftSpec.N_seg} onChange={v=>uF("N_seg",parseInt(v)||1)}/>
            </InputGroup>
          ):(
            <InputGroup label="📐 MCHX Geometry">
              <Field label="W" unit="m" value={mchxSpec.W} onChange={v=>uM("W",v)}/>
              <Field label="H" unit="m" value={mchxSpec.H} onChange={v=>uM("H",v)}/>
              <Field label="ch_w" unit="mm" value={mchxSpec.ch_width*1000} onChange={v=>uM("ch_width",v/1000)}/>
              <Field label="ch_h" unit="mm" value={mchxSpec.ch_height*1000} onChange={v=>uM("ch_height",v/1000)}/>
              <Field label="n_ports" value={mchxSpec.n_ports} onChange={v=>uM("n_ports",parseInt(v)||1)}/>
              <Field label="N_tubes" value={mchxSpec.N_tubes} onChange={v=>uM("N_tubes",parseInt(v)||1)}/>
              <Field label="Lp" unit="mm" value={mchxSpec.louver_pitch*1000} onChange={v=>uM("louver_pitch",v/1000)}/>
              <Field label="θ" unit="°" value={mchxSpec.louver_angle} onChange={v=>uM("louver_angle",v)}/>
              <Field label="Fp" unit="mm" value={mchxSpec.fin_pitch*1000} onChange={v=>uM("fin_pitch",v/1000)}/>
              <Field label="n_slabs" value={mchxSpec.n_slabs} onChange={v=>uM("n_slabs",parseInt(v)||1)}/>
              <Field label="N_seg" unit="/tube" value={mchxSpec.N_seg} onChange={v=>uM("N_seg",parseInt(v)||1)}/>
            </InputGroup>
          )}

          <button onClick={run} disabled={loading} style={{
            width:"100%",padding:"14px 0",borderRadius:10,border:"none",
            cursor:loading?"wait":"pointer",fontWeight:800,fontSize:15,fontFamily:"inherit",
            letterSpacing:1,color:C.bg,
            background:loading?C.dim:`linear-gradient(135deg,${C.accent},${C.accent2})`,
            boxShadow:`0 4px 24px ${C.accent}33`}}>
            {loading?"⏳ Computing...":"▶ RUN SIMULATION"}
          </button>
          {error&&<div style={{marginTop:12,padding:12,borderRadius:8,background:"#7f1d1d33",
            border:`1px solid ${C.err}`,fontSize:11,color:"#fca5a5",wordBreak:"break-all"}}>{error}</div>}
        </div>

        {/* RIGHT PANEL */}
        <div style={{flex:1,padding:20,overflowY:"auto",maxHeight:"calc(100vh - 60px)"}}>
          {!result?(
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",
              flexDirection:"column",gap:12}}>
              <div style={{fontSize:48}}>🔬</div>
              <div style={{color:C.dim,fontSize:14}}>Configure → <b style={{color:C.accent}}>RUN SIMULATION</b></div>
              <div style={{color:C.dim,fontSize:11,maxWidth:450,textAlign:"center",lineHeight:1.7}}>
                Level 2 Tube-Segment Model<br/>
                Nr×Nt×N_seg 세그먼트별 독립 계산, T_wall 반복 수렴<br/>
                FT-HX / MCHX 증발기·응축기 단품 해석
              </div>
            </div>
          ):(
            <>
              <div style={{display:"flex",gap:4,marginBottom:16}}>
                {["overview","segments","charts"].map(t=>(
                  <button key={t} onClick={()=>setTab(t)} style={{
                    padding:"8px 16px",borderRadius:8,border:"none",cursor:"pointer",
                    fontFamily:"inherit",fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:1,
                    background:tab===t?mc:C.card,color:tab===t?C.bg:C.dim}}>{t}</button>
                ))}
              </div>

              {tab==="overview"&&(<>
                <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:16}}>
                  <Metric label="Q_total" value={result.Q_total.toFixed(1)} unit="W" color={mc}/>
                  <Metric label="Q_sensible" value={result.Q_sensible.toFixed(1)} unit="W" color={C.accent}/>
                  <Metric label="Q_latent" value={result.Q_latent.toFixed(1)} unit="W" color={C.accent2}/>
                  <Metric label="SHR" value={result.SHR.toFixed(3)} unit="-" color={C.warn}/>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:16}}>
                  <Metric label="T_air,out" value={result.T_air_out_C.toFixed(1)} unit="°C" color={C.success}/>
                  <Metric label="x_ref,out" value={result.x_ref_out.toFixed(3)} unit="-" color={C.accent3}/>
                  <Metric label="T_sat" value={result.T_sat_C.toFixed(1)} unit="°C" color={C.warn}/>
                  <Metric label="P_sat" value={result.P_sat_kPa.toFixed(0)} unit="kPa" color={C.warn}/>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:16}}>
                  <Metric label="ΔP_air" value={result.dp_air.toFixed(1)} unit="Pa" color={C.dim}/>
                  <Metric label="RH_out" value={(result.RH_out*100).toFixed(1)} unit="%" color={C.accent2}/>
                </div>
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:16}}>
                  <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:8,letterSpacing:1}}>CORRELATIONS</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                    {Object.entries(result.correlations_used).map(([k,v])=>(
                      <span key={k} style={{background:C.bg,padding:"4px 10px",borderRadius:6,fontSize:11}}>
                        <span style={{color:C.dim}}>{k}:</span> {v}</span>
                    ))}
                  </div>
                </div>
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                  <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:6,letterSpacing:1}}>ROW Q DISTRIBUTION</div>
                  <BarChart data={rowData} dataKey="Q" nameKey="name" color={mc}/>
                </div>
              </>)}

              {tab==="segments"&&(
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14,overflowX:"auto"}}>
                  <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:10,letterSpacing:1}}>SEGMENT DETAILS (Tube 0)</div>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>
                      {["Row","Seg","Q [W]","T_wall","T_air","x_ref","h_i","h_o","η_o","Wet","✓"].map(h=>
                        <th key={h} style={{padding:"6px 8px",textAlign:"right",color:C.dim,fontWeight:600}}>{h}</th>
                      )}</tr></thead>
                    <tbody>
                      {result.segments.filter(s=>s.tube===0).map((s,i)=>(
                        <tr key={i} style={{borderBottom:`1px solid ${C.border}22`,background:i%2?`${C.bg}55`:"transparent"}}>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.row}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.seg}</td>
                          <td style={{padding:"5px 8px",textAlign:"right",color:mc,fontWeight:600}}>{s.Q.toFixed(1)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.T_wall.toFixed(1)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.T_air_local.toFixed(1)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.x_ref.toFixed(3)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.h_i.toFixed(0)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.h_o.toFixed(0)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.eta_o.toFixed(3)}</td>
                          <td style={{padding:"5px 8px",textAlign:"center"}}>{s.is_wet?"💧":"—"}</td>
                          <td style={{padding:"5px 8px",textAlign:"center",color:s.converged?C.success:C.err}}>{s.converged?"✓":"✗"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              {tab==="charts"&&(
                <div style={{display:"flex",flexDirection:"column",gap:16}}>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                    <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:6,letterSpacing:1}}>Q PER SEGMENT (Tube 0)</div>
                    <BarChart data={segData} dataKey="Q" nameKey="name" color={mc} height={200}/>
                  </div>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                    <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:6,letterSpacing:1}}>T_WALL & QUALITY</div>
                    <LineChartSVG data={segData} height={220} lines={[
                      {key:"T_wall",color:C.warn,label:"T_wall [°C]"},
                      {key:"x",color:C.accent3,label:"x_ref",min:0,max:1.2}
                    ]}/>
                  </div>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                    <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:6,letterSpacing:1}}>h_i & η_o</div>
                    <LineChartSVG data={segData} height={220} lines={[
                      {key:"h_i",color:C.accent,label:"h_i [W/m²K]"},
                      {key:"eta_o",color:C.success,label:"η_o",min:0,max:1}
                    ]}/>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
