<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❄️ HX Simulator v7.9-L2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;color:#e2e8f0;font-family:'JetBrains Mono','SF Mono','Fira Code','Courier New',monospace}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#111827}
::-webkit-scrollbar-thumb{background:#2a3a52;border-radius:3px}
input,select{font-family:inherit}
input:focus,select:focus{border-color:#38bdf8!important;outline:none}
button:hover{opacity:0.9}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useCallback, useEffect} = React;

const API_URL = window.location.origin;

const DEFAULT_FT = {
  W:0.241,H:0.566,D:0.06,Do:0.005,Di:0.00442,Pt:0.0141,Pl:0.010,
  Nr:6,Nt:4,layout:"staggered",FPI:22,fin_thickness:0.00012,
  fin_type:"slit",k_fin:200,
  wavy_amplitude:0.001,wavy_wavelength:0.01,
  louver_pitch:0.0017,louver_angle:27,
  slit_height:0.001,slit_width:0.007,n_slits:4,
  N_seg:10
};
const DEFAULT_MCHX = {
  W:0.6,H:0.4,D:0.02,n_slabs:1,ch_width:0.001,ch_height:0.0015,
  ch_wall:0.0003,n_ports:12,tube_height:0.002,tube_pitch:0.01,
  louver_pitch:0.0013,louver_angle:27,fin_pitch:0.0014,fin_thickness:0.0001,
  fin_height:0.008,k_fin:200,N_seg:5,N_tubes:40
};
const REFRIGERANTS = ["R410A","R134a","R32","R290","R1234yf","R22","R407C","R404A","R513A","R454C"];

const C = {
  bg:"#0a0e17",surface:"#111827",card:"#1a2233",border:"#2a3a52",
  accent:"#38bdf8",accent2:"#818cf8",accent3:"#f472b6",
  warn:"#fbbf24",success:"#34d399",err:"#ef4444",
  text:"#e2e8f0",dim:"#94a3b8"
};

/* ===== Pure CSS Bar Chart ===== */
function BarChart({data, dataKey, nameKey, color, height=180}) {
  if (!data||data.length===0) return null;
  const maxVal = Math.max(...data.map(d=>Math.abs(d[dataKey])||0), 1);
  return (
    <div style={{height,display:"flex",alignItems:"flex-end",gap:4,padding:"10px 0"}}>
      {data.map((d,i)=>{
        const val = d[dataKey]||0;
        const h = Math.max((Math.abs(val)/maxVal)*(height-40),2);
        return (
          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <span style={{fontSize:9,color:C.dim}}>{Math.round(val)}</span>
            <div style={{width:"100%",maxWidth:60,height:h,background:color||C.accent,
              borderRadius:"4px 4px 0 0",opacity:0.7+0.3*(1-i/data.length),
              transition:"height 0.3s"}}/>
            <span style={{fontSize:9,color:C.dim}}>{d[nameKey]}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ===== Pure SVG Line Chart ===== */
function LineChartSVG({data, lines, height=200}) {
  if (!data||data.length<2) return null;
  const W=600,H=height-40,pad=40;
  const pw=(W-2*pad)/(data.length-1);
  return (
    <svg viewBox={`0 0 ${W} ${height}`} style={{width:"100%",height}}>
      {[0,0.25,0.5,0.75,1].map(f=>(
        <line key={f} x1={pad} x2={W-pad} y1={pad+H*(1-f)} y2={pad+H*(1-f)}
          stroke={C.border} strokeWidth={0.5} strokeDasharray="4 4"/>
      ))}
      {lines.map(({key,color,label,min,max})=>{
        const vals=data.map(d=>d[key]||0);
        const lo=min!==undefined?min:Math.min(...vals);
        const hi=max!==undefined?max:Math.max(...vals);
        const range=hi-lo||1;
        const pts=data.map((d,i)=>`${pad+i*pw},${pad+H*(1-(((d[key]||0)-lo)/range))}`).join(" ");
        return (
          <g key={key}>
            <polyline points={pts} fill="none" stroke={color} strokeWidth={2}/>
            {data.map((d,i)=>{
              const x=pad+i*pw,y=pad+H*(1-(((d[key]||0)-lo)/range));
              return <circle key={i} cx={x} cy={y} r={3} fill={color}/>;
            })}
            <text x={W-pad+5} y={pad+H*(1-((vals[vals.length-1]-lo)/range))}
              fill={color} fontSize={10} dominantBaseline="middle">{label}</text>
          </g>
        );
      })}
      {data.map((d,i)=>(
        <text key={i} x={pad+i*pw} y={height-5} fill={C.dim} fontSize={8}
          textAnchor="middle">{d.name}</text>
      ))}
    </svg>
  );
}

/* ===== UI Components ===== */
function InputGroup({label,children}) {
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:C.accent,marginBottom:10}}>{label}</div>
      {children}
    </div>
  );
}
function Field({label,unit,value,onChange,type="number",options,step,min,max}) {
  const row={display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,gap:8};
  const inp={background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 8px",fontSize:13,width:100,textAlign:"right"};
  if(options) return (
    <div style={row}><span style={{fontSize:12,color:C.dim}}>{label}</span>
    <select value={value} onChange={e=>onChange(e.target.value)} style={{...inp,width:120,textAlign:"left",cursor:"pointer"}}>
      {options.map(o=><option key={o} value={o}>{o}</option>)}</select></div>);
  return (
    <div style={row}>
      <span style={{fontSize:12,color:C.dim}}>{label} {unit&&<span style={{color:C.accent,fontSize:10}}>[{unit}]</span>}</span>
      <input type={type} value={value} step={step||"any"} min={min} max={max}
        onChange={e=>onChange(type==="number"?parseFloat(e.target.value)||0:e.target.value)} style={inp}/>
    </div>);
}
function Metric({label,value,unit,color=C.accent}) {
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 16px",
      flex:"1 1 140px",minWidth:140,borderTop:`3px solid ${color}`}}>
      <div style={{fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:1}}>{label}</div>
      <div style={{fontSize:22,fontWeight:700,color,marginTop:4}}>
        {value} <span style={{fontSize:11,color:C.dim}}>{unit}</span>
      </div>
    </div>);
}

/* ===== Main App ===== */
function App() {
  const [hxType,setHxType]=useState("FT");
  const [mode,setMode]=useState("cond");
  const [airIn,setAirIn]=useState({T:35,RH:0.98,flowMode:"CMM",V:2.0,CMM:2.6});
  const [refIn,setRefIn]=useState({fluid:"R290",stateMode:"P",T_sat:null,P_sat:2811,m_ref:16.5,massUnit:"kg/hr",twoPhase:false,x_in:0.2,T_ref_in:92.6});
  const [flow,setFlow]=useState("counter");
  const [ftSpec,setFtSpec]=useState({...DEFAULT_FT});
  const [mchxSpec,setMchxSpec]=useState({...DEFAULT_MCHX});
  const [airCorr,setAirCorr]=useState({mode:"auto",selected:null});
  const [fCorr,setFCorr]=useState({mode:"auto",selected:null});
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [tab,setTab]=useState("overview");
  const [contourVar,setContourVar]=useState("T_wall");
  const [serverOk,setServerOk]=useState(null);

  useEffect(()=>{
    fetch(API_URL+"/api").then(r=>r.json()).then(()=>setServerOk(true)).catch(()=>setServerOk(false));
  },[]);

  const uA=(k,v)=>setAirIn(p=>({...p,[k]:v}));
  const uR=(k,v)=>setRefIn(p=>({...p,[k]:v}));
  const uF=(k,v)=>setFtSpec(p=>({...p,[k]:v}));
  const uM=(k,v)=>setMchxSpec(p=>({...p,[k]:v}));

  const run=useCallback(async()=>{
    setLoading(true);setError("");
    try {
      const body={hx_type:hxType,mode,T_air_in_C:airIn.T,RH_in:airIn.RH,
        air_flow_mode:airIn.flowMode,
        fluid:refIn.fluid,m_ref:refIn.massUnit==="kg/hr"?refIn.m_ref/3600:refIn.m_ref,flow_arrangement:flow,
        two_phase_inlet:refIn.twoPhase,x_in:refIn.x_in};
      if(airIn.flowMode==="velocity") body.V_air=airIn.V; else body.CMM=airIn.CMM||18;
      if(airCorr.mode==="manual"&&airCorr.selected) body.air_j_corr=airCorr.selected;
      if(fCorr.mode==="manual"&&fCorr.selected) body.air_f_corr=fCorr.selected;
      if(refIn.stateMode==="T") body.T_sat_C=refIn.T_sat; else body.P_sat_kPa=refIn.P_sat;
      if(!refIn.twoPhase&&refIn.T_ref_in!==null) body.T_ref_in_C=refIn.T_ref_in;
      if(hxType==="FT") body.ft_spec=ftSpec; else body.mchx_spec=mchxSpec;
      const res=await fetch(`${API_URL}/simulate`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(!res.ok){const e=await res.json();throw new Error(e.detail||"Failed");}
      setResult(await res.json());setTab("overview");
    }catch(e){setError(e.message);}finally{setLoading(false);}
  },[hxType,mode,airIn,refIn,flow,ftSpec,mchxSpec,airCorr,fCorr]);

  const segData=result?.segments?.filter(s=>s.tube===0)?.map(s=>({
    name:`R${s.row}S${s.seg}`,Q:s.Q,T_wall:s.T_wall,h_i:s.h_i,x:s.x_ref,eta_o:s.eta_o
  }))||[];
  const rowData=result?.row_Q?.map((q,i)=>({name:`R${i}`,Q:q}))||[];
  const mc=mode==="evap"?C.accent:C.accent3;

  return (
    <div style={{minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${C.surface},${C.card})`,
        borderBottom:`1px solid ${C.border}`,padding:"16px 24px",display:"flex",alignItems:"center",gap:16}}>
        <div style={{fontSize:20,fontWeight:800}}>
          <span style={{color:C.accent}}>❄️</span> HX Simulator
          <span style={{color:C.dim,fontSize:11,marginLeft:8}}>v7.9-L2</span>
        </div>
        <div style={{flex:1}}/>
        {serverOk!==null&&(
          <div style={{fontSize:11,color:serverOk?C.success:C.err,display:"flex",alignItems:"center",gap:6}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:serverOk?C.success:C.err,display:"inline-block"}}/>
            {serverOk?"Backend Connected":"Backend Offline"}
          </div>
        )}
        <div style={{fontSize:10,color:C.dim,textAlign:"right",lineHeight:1.4}}>
          Chen · Kim&Mudawar · Shah<br/>Gnielinski · Wang · Chang&Wang
        </div>
      </div>

      <div style={{display:"flex",minHeight:"calc(100vh - 60px)"}}>
        {/* LEFT PANEL */}
        <div style={{width:320,flexShrink:0,padding:16,borderRight:`1px solid ${C.border}`,
          overflowY:"auto",maxHeight:"calc(100vh - 60px)"}}>

          <InputGroup label="Configuration">
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              {["FT","MCHX"].map(t=>(
                <button key={t} onClick={()=>setHxType(t)} style={{flex:1,padding:"8px 0",borderRadius:8,
                  border:"none",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit",
                  background:hxType===t?C.accent:C.bg,color:hxType===t?C.bg:C.dim}}>
                  {t==="FT"?"🔧 Fin-Tube":"⚡ MCHX"}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:6}}>
              {["evap","cond"].map(m=>(
                <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"8px 0",borderRadius:8,
                  border:"none",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit",
                  background:mode===m?mc:C.bg,color:mode===m?C.bg:C.dim}}>
                  {m==="evap"?"❄️ Evaporator":"🔥 Condenser"}</button>
              ))}
            </div>
            <div style={{marginTop:8}}>
              <Field label="Flow" options={["counter","parallel"]} value={flow} onChange={setFlow}/>
            </div>
          </InputGroup>

          <InputGroup label="🌀 Air Inlet">
            <Field label="T_air" unit="°C" value={airIn.T} onChange={v=>uA("T",v)}/>
            <Field label="RH" unit="-" value={airIn.RH} onChange={v=>uA("RH",v)} step={0.05} min={0} max={1}/>
            {/* Velocity / CMM toggle */}
            <div style={{display:"flex",gap:4,marginBottom:8,marginTop:4}}>
              {["velocity","CMM"].map(m=>(
                <button key={m} onClick={()=>uA("flowMode",m)} style={{
                  flex:1,padding:"5px 0",borderRadius:6,border:"none",cursor:"pointer",
                  fontWeight:700,fontSize:11,fontFamily:"inherit",
                  background:airIn.flowMode===m?C.success:C.bg,color:airIn.flowMode===m?C.bg:C.dim}}>
                  {m==="velocity"?"🌬 Velocity":"📦 CMM"}</button>
              ))}
            </div>
            {airIn.flowMode==="velocity" ?
              <Field label="V_face" unit="m/s" value={airIn.V} onChange={v=>uA("V",v)}/> :
              <Field label="CMM" unit="m³/min" value={airIn.CMM||18} onChange={v=>uA("CMM",v)}/>
            }
            {result&&(
              <div style={{fontSize:10,color:C.dim,marginBottom:2,paddingLeft:4}}>
                → {airIn.flowMode==="velocity" ?
                  `CMM = ${result.CMM?.toFixed(2)} m³/min` :
                  `V_face = ${result.V_air?.toFixed(3)} m/s`}
              </div>
            )}
          </InputGroup>

          <InputGroup label="🧊 Refrigerant">
            <Field label="Fluid" options={REFRIGERANTS} value={refIn.fluid} onChange={v=>uR("fluid",v)}/>
            {/* T / P toggle */}
            <div style={{display:"flex",gap:4,marginBottom:8,marginTop:4}}>
              {["T","P"].map(m=>(
                <button key={m} onClick={()=>uR("stateMode",m)} style={{
                  flex:1,padding:"5px 0",borderRadius:6,border:"none",cursor:"pointer",
                  fontWeight:700,fontSize:11,fontFamily:"inherit",
                  background:refIn.stateMode===m?C.warn:C.bg,color:refIn.stateMode===m?C.bg:C.dim}}>
                  {m==="T"?"🌡 Temperature":"📊 Pressure"}</button>
              ))}
            </div>
            {refIn.stateMode==="T" ?
              <Field label="T_sat" unit="°C" value={refIn.T_sat} onChange={v=>uR("T_sat",v)}/> :
              <Field label="P_sat" unit="kPa" value={refIn.P_sat||1000} onChange={v=>uR("P_sat",v)}/>
            }
            {/* Show resolved counterpart from last result */}
            {result&&(
              <div style={{fontSize:10,color:C.dim,marginBottom:6,paddingLeft:4}}>
                → {refIn.stateMode==="T" ?
                  `P_sat = ${result.P_sat_kPa?.toFixed(1)} kPa` :
                  `T_sat = ${result.T_sat_C?.toFixed(2)} °C`}
              </div>
            )}
            <div style={{display:"flex",gap:4,marginBottom:4,marginTop:4}}>
              {["kg/s","kg/hr"].map(u=>(
                <button key={u} onClick={()=>{
                  const old=refIn.massUnit,v=refIn.m_ref;
                  const conv=old==="kg/s"&&u==="kg/hr"?v*3600:old==="kg/hr"&&u==="kg/s"?v/3600:v;
                  uR("massUnit",u);uR("m_ref",parseFloat(conv.toPrecision(4)));
                }} style={{
                  flex:1,padding:"4px 0",borderRadius:6,border:"none",cursor:"pointer",
                  fontWeight:700,fontSize:10,fontFamily:"inherit",
                  background:refIn.massUnit===u?C.success:C.bg,color:refIn.massUnit===u?C.bg:C.dim}}>
                  {u}</button>
              ))}
            </div>
            <Field label="ṁ_ref" unit={refIn.massUnit} value={refIn.m_ref} onChange={v=>uR("m_ref",v)}
              step={refIn.massUnit==="kg/s"?0.001:1}/>
            {/* Two-phase checkbox */}
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6,marginBottom:6}}>
              <input type="checkbox" id="tp" checked={refIn.twoPhase}
                onChange={e=>uR("twoPhase",e.target.checked)}
                style={{width:16,height:16,accentColor:C.accent,cursor:"pointer"}}/>
              <label htmlFor="tp" style={{fontSize:12,color:refIn.twoPhase?C.text:C.dim,cursor:"pointer"}}>
                2상 입구 (Two-Phase Inlet)
              </label>
            </div>
            {refIn.twoPhase ?
              <Field label="x_in" unit="-" value={refIn.x_in} onChange={v=>uR("x_in",v)} step={0.05}/> :
              <Field label="T_ref,in" unit="°C" value={refIn.T_ref_in||refIn.T_sat-5}
                onChange={v=>uR("T_ref_in",v)}/>
            }
          </InputGroup>

          {hxType==="FT"?(
            <InputGroup label="📐 FT Geometry">
              <Field label="W" unit="m" value={ftSpec.W} onChange={v=>uF("W",v)}/>
              <Field label="H" unit="m" value={ftSpec.H} onChange={v=>uF("H",v)}/>
              <Field label="Do" unit="mm" value={Math.round(ftSpec.Do*1e5)/100} onChange={v=>uF("Do",v/1000)}/>
              <Field label="Di" unit="mm" value={Math.round(ftSpec.Di*1e5)/100} onChange={v=>uF("Di",v/1000)}/>
              <Field label="Pt" unit="mm" value={Math.round(ftSpec.Pt*1e4)/10} onChange={v=>uF("Pt",v/1000)}/>
              <Field label="Pl" unit="mm" value={Math.round(ftSpec.Pl*1e4)/10} onChange={v=>uF("Pl",v/1000)}/>
              <Field label="Row" unit="열" value={ftSpec.Nr} onChange={v=>uF("Nr",parseInt(v)||1)}/>
              <Field label="Column" unit="단" value={ftSpec.Nt} onChange={v=>uF("Nt",parseInt(v)||1)}/>
              <Field label="FPI" unit="fins/in" value={ftSpec.FPI} onChange={v=>uF("FPI",v)}/>
              <Field label="Fin" options={["plain","wavy","louver","slit"]} value={ftSpec.fin_type}
                onChange={v=>{uF("fin_type",v);setAirCorr(p=>({...p,selected:null}));setFCorr(p=>({...p,selected:null}));}}/>
              {/* Correlation Mode: Auto / Manual */}
              <div style={{marginBottom:6}}>
                <div style={{fontSize:10,color:C.dim,marginBottom:3}}>Air-side j Correlation</div>
                <div style={{display:"flex",gap:4}}>
                  {["auto","manual"].map(m=>(
                    <button key={m} onClick={()=>setAirCorr(p=>({...p,mode:m,selected:m==="auto"?null:p.selected}))} style={{
                      flex:1,padding:"5px 0",borderRadius:6,border:"none",cursor:"pointer",
                      fontWeight:700,fontSize:10,fontFamily:"inherit",
                      background:airCorr.mode===m?(m==="auto"?C.accent:C.accent2):C.bg,
                      color:airCorr.mode===m?C.bg:C.dim}}>
                      {m==="auto"?"⚡ Auto":"🔧 Manual"}</button>
                  ))}
                </div>
              </div>
              {/* Manual mode: ranked correlation list */}
              {airCorr.mode==="manual"&&(()=>{
                const ranked = result?.correlation_recommendation?.ranked;
                // Map correlation IDs to fin types to detect stale results
                const corrFinMap = {wang2000_plain:'plain',gray_webb1986:'plain',kim1999_plain:'plain',kayansayan1993:'plain',
                  wang1999_wavy:'wavy',wang2002_wavy:'wavy',beecher_fagan1987:'wavy',kim1997_wavy:'wavy',jang1996_wavy:'wavy',
                  wang1999_louver:'louver',chang2000_louver:'louver',wang2000_louver:'louver',achaichia_cowell1988:'louver',davenport1983:'louver',
                  wang2001_slit:'slit',manglik_bergles1995:'slit',nakayama_xu1983:'slit',du_wang2000:'slit'};
                const resultMatchesFin = ranked?.some(r=>corrFinMap[r.id]===ftSpec.fin_type);

                if(!ranked || ranked.length===0 || !resultMatchesFin) return (
                  <div style={{fontSize:10,color:C.warn,padding:"8px",marginBottom:8,
                    background:`${C.warn}11`,border:`1px solid ${C.warn}33`,borderRadius:6}}>
                    🔄 <b>RUN SIMULATION</b>을 클릭하면 <b>{ftSpec.fin_type}</b> 핀의 추천순 상관식 목록이 표시됩니다
                  </div>
                );
                return (
                  <div style={{marginBottom:8}}>
                    {ranked.map(r=>{
                      const sel = airCorr.selected===r.id;
                      const clr = r.status==="error"?C.err:r.status==="warning"?C.warn:C.success;
                      const icon = r.status==="error"?"🚫":r.status==="warning"?"⚠️":"✅";
                      return (
                        <div key={r.id} onClick={()=>setAirCorr(p=>({...p,selected:r.id}))}
                          style={{padding:"6px 8px",marginBottom:3,borderRadius:6,cursor:"pointer",
                            border:`1px solid ${sel?clr:C.border}`,
                            background:sel?`${clr}15`:C.bg,
                            transition:"all 0.15s"}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:10}}>{icon}</span>
                            <span style={{fontSize:11,fontWeight:sel?700:400,color:sel?C.text:C.dim,flex:1}}>
                              {r.name}
                            </span>
                            <span style={{fontSize:9,color:clr}}>{r.in_range}</span>
                          </div>
                          <div style={{fontSize:9,color:C.dim,marginTop:2}}>
                            {r.ref} · {r.samples>0?`${r.samples}샘플`:"범용"} · Re {r.Re_range[0]}~{r.Re_range[1]}
                            {!r.Re_ok&&<span style={{color:C.warn}}> (Re 범위 밖)</span>}
                          </div>
                          {sel&&r.warnings.length>0&&(
                            <div style={{marginTop:3,paddingTop:3,borderTop:`1px solid ${clr}22`}}>
                              {r.warnings.map((w,i)=>(

                  x_ref:{label:"x_ref [-]",key:"x_ref",unit:"",fmt:v=>v.toFixed(3)},
                  h_i:{label:"h_i [W/m²K]",key:"h_i",unit:"",fmt:v=>v.toFixed(0)},
                  h_o:{label:"h_o [W/m²K]",key:"h_o",unit:"",fmt:v=>v.toFixed(0)},
                  eta_o:{label:"η_o [-]",key:"eta_o",unit:"",fmt:v=>v.toFixed(3)},
                };
                const cv = vars[contourVar] || vars.T_wall;

                // Build 2D grid values
                const grid = [];
                let vMin=Infinity, vMax=-Infinity;
                for(let ri=0;ri<Nr;ri++){
                  const rowArr=[];
                  for(let si=0;si<Ns;si++){
                    const seg = tube0.find(s=>s.row===rows[ri]&&s.seg===segIds[si]);
                    const val = seg ? seg[cv.key] : 0;
                    rowArr.push(val);
                    if(val<vMin) vMin=val;
                    if(val>vMax) vMax=val;
                  }
                  grid.push(rowArr);
                }
                const vRange = vMax-vMin || 1;

                // Color interpolation (blue → cyan → green → yellow → red)
                function valToColor(v){
                  const t = Math.max(0,Math.min(1,(v-vMin)/vRange));
                  // 5-stop gradient
                  const stops = [
                    [0.0, [30,70,200]],   // blue
                    [0.25,[30,180,220]],   // cyan
                    [0.5, [50,200,80]],    // green
                    [0.75,[240,200,40]],   // yellow
                    [1.0, [220,50,40]],    // red
                  ];
                  let i=0;
                  for(;i<stops.length-1;i++) if(t<=stops[i+1][0]) break;
                  const [t0,c0]=stops[i], [t1,c1]=stops[Math.min(i+1,stops.length-1)];
                  const f = t1>t0 ? (t-t0)/(t1-t0) : 0;
                  const r=Math.round(c0[0]+(c1[0]-c0[0])*f);
                  const g=Math.round(c0[1]+(c1[1]-c0[1])*f);
                  const b=Math.round(c0[2]+(c1[2]-c0[2])*f);
                  return `rgb(${r},${g},${b})`;
                }

                // SVG dimensions
                const pad={top:45,bottom:50,left:55,right:20};
                const cellW=Math.min(50,Math.max(28,(480-pad.left-pad.right)/Ns));
                const cellH=Math.min(50,Math.max(28,(300-pad.top-pad.bottom)/Nr));
                const svgW=pad.left+Ns*cellW+pad.right+80;
                const svgH=pad.top+Nr*cellH+pad.bottom;

                // Color bar
                const cbX=pad.left+Ns*cellW+20, cbW=14, cbH=Nr*cellH;
                const cbStops=20;

                return (
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                      <div style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:1}}>HX CONTOUR MAP</div>
                      <select value={contourVar} onChange={e=>setContourVar(e.target.value)}
                        style={{background:C.bg,color:C.text,border:`1px solid ${C.border}`,
                          borderRadius:6,padding:"4px 8px",fontSize:11,fontFamily:"inherit"}}>
                        {Object.entries(vars).map(([k,v])=>
                          <option key={k} value={k}>{v.label}</option>
                        )}
                      </select>
                      <span style={{fontSize:10,color:C.dim}}>Tube 0 · {Nr} rows × {Ns} segs</span>
                    </div>
                    <div style={{overflowX:"auto"}}>
                      <svg width={svgW} height={svgH} style={{display:"block"}}>
                        {/* Title */}
                        <text x={pad.left+Ns*cellW/2} y={16} textAnchor="middle"
                          style={{fontSize:12,fill:C.text,fontWeight:700}}>{cv.label}</text>

                        {/* Air flow arrow */}
                        <defs>
                          <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                            <polygon points="0 0, 8 3, 0 6" fill={C.accent}/>
                          </marker>
                        </defs>
                        <line x1={12} y1={pad.top+Nr*cellH/2-20} x2={12} y2={pad.top+Nr*cellH/2+20}
                          stroke={C.accent} strokeWidth={2} markerEnd="url(#arrowhead)"/>
                        <text x={12} y={pad.top+Nr*cellH/2-25} textAnchor="middle"
                          style={{fontSize:9,fill:C.accent,fontWeight:700}}>AIR</text>

                        {/* Heatmap cells */}
                        {grid.map((row,ri)=>
                          row.map((val,si)=>{
                            const x=pad.left+si*cellW, y=pad.top+ri*cellH;
                            const col=valToColor(val);
                            return (
                              <g key={`${ri}-${si}`}>
                                <rect x={x} y={y} width={cellW} height={cellH}
                                  fill={col} stroke={C.bg} strokeWidth={1} rx={2}/>
                                <text x={x+cellW/2} y={y+cellH/2+4} textAnchor="middle"
                                  style={{fontSize:cellW>35?9:7,fill:"#fff",fontWeight:600,
                                    textShadow:"0 0 3px rgba(0,0,0,0.7)"}}>
                                  {cv.fmt(val)}
                                </text>
                              </g>
                            );
                          })
                        )}

                        {/* Tube circles overlay (staggered) */}
                        {rows.map((r,ri)=>{
                          const cy=pad.top+ri*cellH+cellH/2;
                          const tubeR=Math.min(cellH*0.3,8);
                          // Place tubes at segment boundaries (between segments)
                          return segIds.slice(0,-1).map((s,si)=>{
                            const cx=pad.left+(si+1)*cellW;
                            // Stagger odd rows
                            const offset = ri%2===1 ? cellW*0.5 : 0;
                            return (
                              <circle key={`t${ri}-${si}`} cx={cx+offset*0} cy={cy}
                                r={tubeR} fill="none" stroke={`${C.text}44`} strokeWidth={1}/>
                            );
                          });
                        })}

                        {/* Row labels */}
                        {rows.map((r,ri)=>(
                          <text key={`rl${ri}`} x={pad.left-6} y={pad.top+ri*cellH+cellH/2+4}
                            textAnchor="end" style={{fontSize:10,fill:C.dim}}>R{r}</text>
                        ))}

                        {/* Segment labels */}
                        {segIds.map((s,si)=>(
                          <text key={`sl${si}`} x={pad.left+si*cellW+cellW/2} y={pad.top+Nr*cellH+14}
                            textAnchor="middle" style={{fontSize:10,fill:C.dim}}>S{s}</text>
                        ))}

                        {/* Axis labels */}
                        <text x={pad.left+Ns*cellW/2} y={pad.top+Nr*cellH+32}
                          textAnchor="middle" style={{fontSize:10,fill:C.dim,fontWeight:600}}>
                          ← Segment along tube →
                        </text>
                        <text x={28} y={pad.top+Nr*cellH/2} textAnchor="middle"
                          transform={`rotate(-90,28,${pad.top+Nr*cellH/2})`}
                          style={{fontSize:10,fill:C.dim,fontWeight:600}}>
                          Row (airflow →)
                        </text>

                        {/* Color bar */}
                        {Array.from({length:cbStops}).map((_,i)=>{
                          const t = 1 - i/(cbStops-1);
                          const val = vMin + t*vRange;
                          const y = pad.top + i*(cbH/cbStops);
                          return (
                            <rect key={`cb${i}`} x={cbX} y={y} width={cbW} height={cbH/cbStops+1}
                              fill={valToColor(val)} stroke="none"/>
                          );
                        })}
                        <rect x={cbX} y={pad.top} width={cbW} height={cbH}
                          fill="none" stroke={C.border} strokeWidth={1} rx={2}/>
                        <text x={cbX+cbW+4} y={pad.top+6} style={{fontSize:8,fill:C.text}}>
                          {cv.fmt(vMax)}
                        </text>
                        <text x={cbX+cbW+4} y={pad.top+cbH} style={{fontSize:8,fill:C.text}}>
                          {cv.fmt(vMin)}
                        </text>
                        <text x={cbX+cbW+4} y={pad.top+cbH/2+3} style={{fontSize:8,fill:C.dim}}>
                          {cv.fmt((vMin+vMax)/2)}
                        </text>
                      </svg>
                    </div>

                    {/* Summary stats */}
                    <div style={{display:"flex",gap:16,marginTop:10,padding:"8px 10px",
                      background:C.bg,borderRadius:6,fontSize:11}}>
                      <span><span style={{color:C.dim}}>Min:</span> <span style={{color:valToColor(vMin),fontWeight:700}}>{cv.fmt(vMin)}</span></span>
                      <span><span style={{color:C.dim}}>Max:</span> <span style={{color:valToColor(vMax),fontWeight:700}}>{cv.fmt(vMax)}</span></span>
                      <span><span style={{color:C.dim}}>Range:</span> {cv.fmt(vRange)}</span>
                      <span><span style={{color:C.dim}}>Mean:</span> {cv.fmt(tube0.reduce((s,v)=>s+v[cv.key],0)/tube0.length)}</span>
                    </div>
                  </div>
                );
              })()}

              {tab==="segments"&&(
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14,overflowX:"auto"}}>
                  <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:10,letterSpacing:1}}>SEGMENT DETAILS (Tube 0)</div>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>
                      {["Row","Seg","Q [W]","T_wall","T_air","x_ref","h_i","h_o","η_o","Wet","✓"].map(h=>
                        <th key={h} style={{padding:"6px 8px",textAlign:"right",color:C.dim,fontWeight:600}}>{h}</th>
                      )}</tr></thead>
                    <tbody>
                      {result.segments.filter(s=>s.tube===0).map((s,i)=>(
                        <tr key={i} style={{borderBottom:`1px solid ${C.border}22`,background:i%2?`${C.bg}55`:"transparent"}}>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.row}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.seg}</td>
                          <td style={{padding:"5px 8px",textAlign:"right",color:mc,fontWeight:600}}>{s.Q.toFixed(1)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.T_wall.toFixed(1)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.T_air_local.toFixed(1)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.x_ref.toFixed(3)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.h_i.toFixed(0)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.h_o.toFixed(0)}</td>
                          <td style={{padding:"5px 8px",textAlign:"right"}}>{s.eta_o.toFixed(3)}</td>
                          <td style={{padding:"5px 8px",textAlign:"center"}}>{s.is_wet?"💧":"—"}</td>
                          <td style={{padding:"5px 8px",textAlign:"center",color:s.converged?C.success:C.err}}>{s.converged?"✓":"✗"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              {tab==="charts"&&(
                <div style={{display:"flex",flexDirection:"column",gap:16}}>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                    <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:6,letterSpacing:1}}>Q PER SEGMENT (Tube 0)</div>
                    <BarChart data={segData} dataKey="Q" nameKey="name" color={mc} height={200}/>
                  </div>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                    <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:6,letterSpacing:1}}>T_WALL & QUALITY</div>
                    <LineChartSVG data={segData} height={220} lines={[
                      {key:"T_wall",color:C.warn,label:"T_wall [°C]"},
                      {key:"x",color:C.accent3,label:"x_ref",min:0,max:1.2}
                    ]}/>
                  </div>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
                    <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:6,letterSpacing:1}}>h_i & η_o</div>
                    <LineChartSVG data={segData} height={220} lines={[
                      {key:"h_i",color:C.accent,label:"h_i [W/m²K]"},
                      {key:"eta_o",color:C.success,label:"η_o",min:0,max:1}
                    ]}/>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
